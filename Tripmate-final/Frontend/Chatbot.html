<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripMate Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            /* Theme: Luminous Dusk · Glassmorphism */
            --sky-top: #04091a;
            --sky-mid: #0d1f4e;
            --sky-dusk: #a04010;
            --sky-amber: #f0a34a;
            --sky-peach: #ffd090;
            --gold: #f5a623;
            --gold-light: #f5c96a;
            --gold-dark: #b8621a;
            --teal: #38c7b8;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-b: rgba(255, 255, 255, 0.16);
            --text-primary: rgba(255, 248, 235, 0.95);
            --text-muted: rgba(220, 200, 165, 0.60);
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-bdr: rgba(255, 255, 255, 0.14);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --spring: cubic-bezier(0.22, 1, 0.36, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ══ SCENE ══ */
        #scene {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background: linear-gradient(175deg,
                    var(--sky-top) 0%,
                    #0b1a44 25%,
                    #153070 48%,
                    var(--sky-dusk) 70%,
                    var(--sky-amber) 84%,
                    var(--sky-peach) 100%);
        }

        /* ── Stars ── */
        #starCanvas {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* ── Floating orbs ── */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
            animation: orb-drift var(--dur, 14s) ease-in-out infinite;
        }

        .orb1 {
            width: 280px;
            height: 280px;
            background: rgba(245, 166, 35, 0.08);
            top: 10%;
            left: 5%;
            --dur: 16s;
        }

        .orb2 {
            width: 200px;
            height: 200px;
            background: rgba(56, 199, 184, 0.06);
            top: 30%;
            right: 8%;
            --dur: 20s;
            animation-delay: -7s;
        }

        .orb3 {
            width: 340px;
            height: 340px;
            background: rgba(245, 100, 30, 0.06);
            bottom: 20%;
            left: 50%;
            --dur: 18s;
            animation-delay: -4s;
        }

        @keyframes orb-drift {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-28px) scale(1.08);
            }
        }

        /* ── Sun ── */
        .sun {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 82px;
            height: 82px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffe9a0 0%, #f5a623 42%, rgba(240, 120, 30, 0) 72%);
            box-shadow: 0 0 72px 40px rgba(245, 166, 35, 0.25), 0 0 150px 75px rgba(240, 100, 10, 0.10);
            animation: sun-pulse 8s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes sun-pulse {

            0%,
            100% {
                transform: translateX(-50%) scale(1);
            }

            50% {
                transform: translateX(-50%) scale(1.09);
            }
        }

        /* ── Rays ── */
        .rays {
            position: absolute;
            bottom: 30%;
            left: 50%;
            width: 360px;
            height: 360px;
            margin-left: -180px;
            margin-bottom: -180px;
            z-index: 0;
            opacity: 0.07;
            animation: spin-rays 65s linear infinite;
        }

        .ray {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 220, 100, 0.9), transparent);
            transform-origin: left center;
        }

        @keyframes spin-rays {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* ── Clouds ── */
        .cloud-track {
            position: absolute;
            top: 0;
            left: 0;
            width: 250%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .ct1 {
            animation: drift 90s linear infinite;
        }

        .ct2 {
            animation: drift 128s linear infinite;
            animation-delay: -42s;
        }

        .ct3 {
            animation: drift 72s linear infinite;
            animation-delay: -16s;
            opacity: .5;
        }

        @keyframes drift {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        .cloud {
            position: absolute;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.78);
            filter: blur(3px);
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .cl-a {
            width: 250px;
            height: 60px;
            top: 10%;
            left: 5%;
        }

        .cl-a::before {
            width: 105px;
            height: 105px;
            top: -54px;
            left: 38px;
        }

        .cl-a::after {
            width: 82px;
            height: 82px;
            top: -42px;
            left: 108px;
        }

        .cl-b {
            width: 190px;
            height: 48px;
            top: 20%;
            left: 47%;
            opacity: .7;
        }

        .cl-b::before {
            width: 76px;
            height: 76px;
            top: -40px;
            left: 26px;
        }

        .cl-b::after {
            width: 60px;
            height: 60px;
            top: -30px;
            left: 76px;
        }

        .cl-c {
            width: 290px;
            height: 68px;
            top: 7%;
            left: 74%;
            opacity: .62;
        }

        .cl-c::before {
            width: 112px;
            height: 112px;
            top: -58px;
            left: 48px;
        }

        .cl-c::after {
            width: 88px;
            height: 88px;
            top: -46px;
            left: 128px;
        }

        .cl-d {
            width: 175px;
            height: 43px;
            top: 27%;
            left: 20%;
            opacity: .48;
        }

        .cl-d::before {
            width: 68px;
            height: 68px;
            top: -35px;
            left: 21px;
        }

        .cl-d::after {
            width: 53px;
            height: 53px;
            top: -27px;
            left: 66px;
        }

        .cl-e {
            width: 230px;
            height: 54px;
            top: 14%;
            left: 34%;
            opacity: .58;
        }

        .cl-e::before {
            width: 92px;
            height: 92px;
            top: -48px;
            left: 34px;
        }

        .cl-e::after {
            width: 72px;
            height: 72px;
            top: -36px;
            left: 99px;
        }

        .cl-f {
            width: 155px;
            height: 38px;
            top: 32%;
            left: 60%;
            opacity: .38;
            filter: blur(5px);
        }

        .cl-g {
            width: 205px;
            height: 50px;
            top: 8%;
            left: 17%;
            opacity: .48;
            filter: blur(3px);
        }

        /* ── Mountains ── */
        .mtns {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 3;
        }

        .mtns svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Trees ── */
        .trees {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20%;
            z-index: 4;
            pointer-events: none;
        }

        .trees svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Ground ── */
        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8%;
            background: linear-gradient(180deg, #0a1a0a 0%, #050d05 100%);
            z-index: 5;
        }

        .ground::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.30), transparent);
        }

        /* ── Airplane ── */
        .plane-wrap {
            position: absolute;
            top: 13%;
            left: -180px;
            z-index: 6;
            animation: fly 30s cubic-bezier(0.25, 0, 0.75, 1) infinite;
        }

        .plane-svg {
            width: 148px;
            height: auto;
            filter: drop-shadow(0 6px 22px rgba(200, 230, 255, 0.45));
            transform: rotate(-5deg);
        }

        @keyframes fly {
            0% {
                left: -180px;
                top: 15%;
                opacity: 0;
            }

            4% {
                opacity: 1;
            }

            40% {
                top: 11%;
            }

            65% {
                top: 13%;
            }

            96% {
                opacity: 1;
            }

            100% {
                left: 110%;
                top: 9%;
                opacity: 0;
            }
        }

        /* ── Overlay ── */
        .overlay-bg {
            position: fixed;
            inset: 0;
            z-index: 7;
            pointer-events: none;
            background: linear-gradient(162deg, rgba(2, 7, 22, 0.54) 0%, rgba(10, 20, 55, 0.28) 52%, rgba(0, 0, 0, 0.56) 100%);
        }

        /* ══ CHAT STAGE ══ */
        .stage {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            pointer-events: none;
        }

        .chat-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: clamp(500px, 85vh, 750px);
            padding: 2px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent);
            border-radius: 30px;
            animation: card-rise 1s var(--spring) both;
            pointer-events: all;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.7);
        }

        .card {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0a1432;
            /* Solid dark theme matching background */
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 18%;
            right: 18%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.78), transparent);
            z-index: 2;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            padding: 20px 0 10px;
            animation: fade-up 0.7s 0.2s both;
        }

        .logo-container img {
            width: 130px;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(245, 166, 35, 0.3));
        }

        .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.75);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 7px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            z-index: 5;
            animation: fade-up 0.7s 0.1s both;
        }

        .back-btn:hover {
            background: rgba(245, 166, 35, 0.15);
            border-color: rgba(245, 166, 35, 0.35);
            color: #f5c96a;
            transform: translateX(-2px);
        }

        .back-btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .header {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #fff 22%, #f5c96a 60%, #f5a623 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin-bottom: 20px;
            letter-spacing: 0.02em;
            animation: fade-up 0.7s 0.3s both;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
            animation: fade-up 0.7s 0.4s both;
        }

        .messages::-webkit-scrollbar {
            display: none;
        }

        .messages p {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            color: #1a0900;
            border-bottom-right-radius: 4px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(184, 98, 26, 0.2);
        }

        .bot-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .error-msg {
            align-self: center;
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
            font-style: italic;
            text-align: center;
        }

        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--glass-b);
            animation: fade-up 0.7s 0.5s both;
        }

        input {
            flex: 1;
            padding: 13px 18px;
            background: var(--input-bg);
            border: 1px solid var(--input-bdr);
            border-radius: 14px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s var(--ease);
        }

        input:focus {
            border-color: rgba(245, 166, 35, 0.45);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 0 4px rgba(245, 166, 35, 0.08);
        }

        button {
            padding: 0 20px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            border: none;
            border-radius: 14px;
            color: #1a0900;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s var(--spring);
            box-shadow: 0 4px 15px rgba(184, 98, 26, 0.2);
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(184, 98, 26, 0.3);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        @keyframes card-rise {
            from {
                opacity: 0;
                transform: translateY(44px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading animation dots */
        .loading-dots span {
            animation: bounce 1.4s infinite ease-in-out both;
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            margin: 0 2px;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: -0.32s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1.0);
            }
        }
    </style>
</head>

<body>

    <!-- ══ SCENE ══ -->
    <div id="scene">
        <canvas id="starCanvas"></canvas>

        <!-- Depth orbs -->
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>

        <div class="sun"></div>
        <div class="rays" id="rays"></div>

        <!-- Clouds -->
        <div class="cloud-track ct1">
            <div class="cloud cl-a"></div>
            <div class="cloud cl-b"></div>
            <div class="cloud cl-c"></div>
            <div class="cloud cl-f"></div>
            <div class="cloud cl-a" style="left:52%"></div>
            <div class="cloud cl-b" style="left:96%"></div>
            <div class="cloud cl-c" style="left:123%"></div>
        </div>
        <div class="cloud-track ct2">
            <div class="cloud cl-d"></div>
            <div class="cloud cl-e"></div>
            <div class="cloud cl-g"></div>
            <div class="cloud cl-d" style="left:70%"></div>
            <div class="cloud cl-e" style="left:105%"></div>
        </div>
        <div class="cloud-track ct3">
            <div class="cloud cl-f"></div>
            <div class="cloud cl-b" style="left:35%;top:30%"></div>
            <div class="cloud cl-f" style="left:85%"></div>
        </div>

        <!-- Mountains -->
        <div class="mtns">
            <svg viewBox="0 0 1440 380" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="mFar" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#1c3066" stop-opacity=".72" />
                        <stop offset="100%" stop-color="#080e22" />
                    </linearGradient>
                    <linearGradient id="mMid" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#122050" stop-opacity=".88" />
                        <stop offset="100%" stop-color="#060c18" />
                    </linearGradient>
                    <linearGradient id="mNear" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#0c1830" />
                        <stop offset="100%" stop-color="#030810" />
                    </linearGradient>
                    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="rgba(255,255,255,0.50)" />
                        <stop offset="100%" stop-color="rgba(255,255,255,0)" />
                    </linearGradient>
                </defs>
                <polygon fill="url(#mFar)"
                    points="0,240 80,138 165,192 268,98 375,162 485,78 604,157 724,63 844,147 965,73 1083,157 1204,83 1325,152 1440,98 1440,380 0,380" />
                <polygon fill="url(#snow)" opacity=".65" points="268,98 248,130 288,130" />
                <polygon fill="url(#snow)" opacity=".55" points="485,78 463,116 507,116" />
                <polygon fill="url(#snow)" opacity=".65" points="724,63 702,98 746,98" />
                <polygon fill="url(#snow)" opacity=".55" points="965,73 944,108 986,108" />
                <polygon fill="url(#snow)" opacity=".50" points="1204,83 1183,118 1225,118" />
                <polygon fill="url(#mMid)"
                    points="0,278 72,208 152,248 243,183 342,228 452,163 572,223 682,153 803,218 922,158 1042,218 1163,163 1282,218 1382,178 1440,204 1440,380 0,380" />
                <polygon fill="url(#mNear)"
                    points="0,318 62,268 142,293 242,248 362,288 482,238 602,278 722,243 842,276 962,243 1082,278 1202,246 1332,273 1440,250 1440,380 0,380" />
            </svg>
        </div>

        <!-- Trees -->
        <div class="trees">
            <svg viewBox="0 0 1440 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="tG" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#0a1f0a" />
                        <stop offset="100%" stop-color="#020602" />
                    </linearGradient>
                </defs>
                <g fill="url(#tG)">
                    <polygon points="0,160 17,90 34,160" />
                    <polygon points="14,160 32,76 50,160" />
                    <polygon points="30,160 47,86 64,160" />
                    <polygon points="44,160 60,96 76,160" />
                    <polygon points="58,160 74,82 90,160" />
                    <polygon points="73,160 90,93 107,160" />
                    <polygon points="88,160 105,84 122,160" />
                    <polygon points="102,160 118,95 134,160" />
                    <polygon points="148,160 165,80 182,160" />
                    <polygon points="162,160 180,88 198,160" />
                    <polygon points="178,160 194,82 210,160" />
                    <polygon points="192,160 208,90 224,160" />
                    <polygon points="210,160 227,85 244,160" />
                    <polygon points="227,160 243,97 259,160" />
                    <polygon points="1050,160 1067,84 1084,160" />
                    <polygon points="1065,160 1083,76 1101,160" />
                    <polygon points="1082,160 1098,86 1114,160" />
                    <polygon points="1098,160 1114,81 1130,160" />
                    <polygon points="1115,160 1132,89 1149,160" />
                    <polygon points="1130,160 1148,80 1166,160" />
                    <polygon points="1250,160 1267,88 1284,160" />
                    <polygon points="1265,160 1283,76 1301,160" />
                    <polygon points="1282,160 1298,84 1314,160" />
                    <polygon points="1298,160 1315,90 1332,160" />
                    <polygon points="1314,160 1332,80 1350,160" />
                    <polygon points="1330,160 1348,88 1366,160" />
                    <polygon points="1348,160 1365,82 1382,160" />
                    <polygon points="1364,160 1381,91 1398,160" />
                    <polygon points="1380,160 1398,78 1416,160" />
                    <polygon points="1396,160 1413,86 1430,160" />
                    <polygon points="1414,160 1430,90 1446,160" />
                </g>
            </svg>
        </div>

        <div class="ground"></div>

        <!-- Airplane -->
        <div class="plane-wrap">
            <svg class="plane-svg" viewBox="0 0 130 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="58" cy="21" rx="46" ry="9.5" fill="white" opacity=".97" />
                <path d="M104 21C116 21 128 19 128 21C128 23 116 21 104 21Z" fill="white" opacity=".97" />
                <path d="M12 21C8 12 4 7 2 7C4 7 10 12 12 21Z" fill="white" opacity=".92" />
                <path d="M12 21C8 30 4 35 2 35C4 35 10 30 12 21Z" fill="white" opacity=".92" />
                <path d="M64 22C52 38 28 44 14 42C28 37 56 30 64 22Z" fill="white" opacity=".88" />
                <path d="M64 20C52 4 28 -2 14 0C28 5 56 12 64 20Z" fill="white" opacity=".88" />
                <path d="M16 22C12 27 6 29 3 28C7 27 12 25 16 22Z" fill="white" opacity=".82" />
                <path d="M16 20C12 15 6 13 3 14C7 15 12 17 16 20Z" fill="white" opacity=".82" />
                <ellipse cx="52" cy="28" rx="12" ry="4" fill="#e0e8f0" opacity=".68" />
                <ellipse cx="52" cy="14" rx="12" ry="4" fill="#e0e8f0" opacity=".68" />
                <circle cx="78" cy="19" r="2.4" fill="#b8d4f5" opacity=".75" />
                <circle cx="87" cy="18.5" r="2.4" fill="#b8d4f5" opacity=".75" />
                <circle cx="96" cy="18.5" r="2.4" fill="#b8d4f5" opacity=".72" />
                <circle cx="105" cy="19" r="2.4" fill="#b8d4f5" opacity=".65" />
            </svg>
        </div>
    </div>

    <div class="overlay-bg"></div>

    <!-- ══ CHAT STAGE ══ -->
    <div class="stage">
        <div class="chat-container">
            <div class="card">
                <button class="back-btn" onclick="goBack()">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 12H5M12 19l-7-7 7-7" />
                    </svg>
                    Back
                </button>
                <div class="logo-container">
                    <img src="Tripmate-logo.png" alt="TripMate Logo">
                </div>
                <div class="header">AI Assistant</div>

                <div class="messages" id="chat">
                    <p class="bot-msg"><b>Bot:</b> Hello! I'm TripMate. Where are we traveling today? ✈️</p>
                </div>

                <div class="input-area">
                    <input type="text" id="msg" placeholder="Ask travel questions..." onkeypress="handleKeyPress(event)"
                        autocomplete="off">
                    <button id="sendBtn" onclick="sendMsg()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ══ Stars ══ */
        (function () {
            const c = document.getElementById('starCanvas'),
                ctx = c.getContext('2d');
            let stars = [],
                W, H;

            function resize() {
                W = c.width = window.innerWidth;
                H = c.height = window.innerHeight;
                build()
            }

            function build() {
                stars = [];
                for (let i = 0; i < 80; i++) stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H * .58,
                    r: Math.random() * 1.5 + .3,
                    a: Math.random(),
                    da: (Math.random() * .011 + .004) * (Math.random() < .5 ? 1 : -1),
                    maxA: Math.random() * .65 + .3
                });
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                stars.forEach(s => {
                    s.a += s.da;
                    if (s.a > s.maxA || s.a < .05) s.da *= -1;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,245,220,${s.a})`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            window.addEventListener('resize', resize);
            resize();
            draw();
        })();

        /* ══ Sun rays ══ */
        (function () {
            const w = document.getElementById('rays');
            for (let i = 0; i < 18; i++) {
                const r = document.createElement('div');
                r.className = 'ray';
                r.style.transform = `rotate(${i * 20}deg)`;
                w.appendChild(r);
            }
        })();

        /* ══ Chatbot Logic ══ */
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMsg();
        }

        async function sendMsg() {
            const input = document.getElementById("msg");
            const btn = document.getElementById("sendBtn");
            const chat = document.getElementById("chat");
            const userText = input.value.trim();

            if (!userText) return;

            chat.innerHTML += `<p class="user-msg"><b>You:</b> ${userText}</p>`;
            input.value = "";
            btn.disabled = true;
            chat.scrollTop = chat.scrollHeight;

            const loadingId = "loading-" + Date.now();
            chat.innerHTML += `
                <p class="bot-msg" id="${loadingId}">
                    <b>Bot:</b> 
                    <span class="loading-dots">
                        <span></span><span></span><span></span>
                    </span>
                </p>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch("https://0p5cebf468.execute-api.us-east-1.amazonaws.com/default/tripmate-chatbot", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: userText
                    })
                });

                const data = await response.json();
                const loadingElem = document.getElementById(loadingId);
                if (loadingElem) loadingElem.remove();

                if (!response.ok) {
                    throw new Error(data.error || `Server Error (${response.status})`);
                }

                chat.innerHTML += `<p class="bot-msg"><b>Bot:</b> ${data.reply}</p>`;

            } catch (error) {
                console.error("Fetch Error:", error);
                const loadingElem = document.getElementById(loadingId);
                if (loadingElem) loadingElem.remove();

                let displayMsg = error.message;
                if (displayMsg.toLowerCase().includes("demand") || displayMsg.toLowerCase().includes("busy")) {
                    displayMsg = "TripMate AI is a bit busy planning other adventures right now. Please wait a few seconds and try again!";
                }

                chat.innerHTML += `<p class="error-msg"><b>Bot:</b> ${displayMsg} 😢</p>`;
            } finally {
                btn.disabled = false;
                chat.scrollTop = chat.scrollHeight;
                input.focus();
            }
        }
        function goBack() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('from') === 'view') {
                window.location.href = 'view.html';
            } else {
                window.location.href = 'view-trips.html';
            }
        }
    </script>
</body>

</html>
