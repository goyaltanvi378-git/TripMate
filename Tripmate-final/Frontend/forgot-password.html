<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>TripMate — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════
   TRIPMATE — FORGOT PASSWORD PAGE
   Theme: Luminous Dusk · Glassmorphism
   ══════════════════════════════════════════ */

    :root {
      --sky-top: #04091a;
      --sky-mid: #0d1f4e;
      --sky-lower: #1a4a8a;
      --sky-dusk: #a04010;
      --sky-amber: #f0a34a;
      --sky-peach: #ffd090;
      --gold: #f5a623;
      --gold-light: #f5c96a;
      --gold-dark: #b8621a;
      --teal: #38c7b8;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.16);
      --text-primary: rgba(255, 248, 235, 0.95);
      --text-muted: rgba(220, 200, 165, 0.60);
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(255, 255, 255, 0.14);
      --input-focus: rgba(245, 166, 35, 0.45);
      --error: #ff6b6b;
      --success: #38c7b8;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ── Reset ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ SCENE ══ */
    #scene {
      position: fixed;
      inset: 0;
      background: linear-gradient(175deg,
          var(--sky-top) 0%,
          #0b1a44 28%,
          #153070 50%,
          var(--sky-dusk) 72%,
          var(--sky-amber) 85%,
          var(--sky-peach) 100%);
      overflow: hidden;
    }

    /* ── Star Canvas ── */
    #starCanvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ── Sun ── */
    .sun {
      position: absolute;
      bottom: 28%;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe9a0 0%, #f5a623 42%, rgba(240, 120, 30, 0) 72%);
      box-shadow: 0 0 70px 38px rgba(245, 166, 35, 0.26), 0 0 150px 75px rgba(240, 100, 10, 0.11);
      animation: sun-pulse 8s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes sun-pulse {

      0%,
      100% {
        transform: translateX(-50%) scale(1);
        box-shadow: 0 0 70px 38px rgba(245, 166, 35, 0.26), 0 0 150px 75px rgba(240, 100, 10, 0.11);
      }

      50% {
        transform: translateX(-50%) scale(1.1);
        box-shadow: 0 0 100px 52px rgba(245, 166, 35, 0.36), 0 0 190px 95px rgba(240, 100, 10, 0.16);
      }
    }

    /* ── Rays ── */
    .rays {
      position: absolute;
      bottom: 28%;
      left: 50%;
      width: 360px;
      height: 360px;
      margin-left: -180px;
      margin-bottom: -180px;
      z-index: 0;
      opacity: 0.07;
      animation: spin-rays 70s linear infinite;
    }

    .ray {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 180px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255, 220, 100, 0.9), transparent);
      transform-origin: left center;
    }

    @keyframes spin-rays {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* ── Clouds ── */
    .cloud-track {
      position: absolute;
      top: 0;
      left: 0;
      width: 250%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .ct1 {
      animation: drift 95s linear infinite;
    }

    .ct2 {
      animation: drift 135s linear infinite;
      animation-delay: -45s;
    }

    .ct3 {
      animation: drift 75s linear infinite;
      animation-delay: -18s;
      opacity: .5;
    }

    @keyframes drift {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    .cloud {
      position: absolute;
      border-radius: 60px;
      background: rgba(255, 255, 255, 0.78);
      filter: blur(3px);
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .cl-a {
      width: 250px;
      height: 60px;
      top: 10%;
      left: 5%
    }

    .cl-a::before {
      width: 105px;
      height: 105px;
      top: -54px;
      left: 38px
    }

    .cl-a::after {
      width: 82px;
      height: 82px;
      top: -42px;
      left: 108px
    }

    .cl-b {
      width: 190px;
      height: 48px;
      top: 20%;
      left: 47%;
      opacity: .7
    }

    .cl-b::before {
      width: 76px;
      height: 76px;
      top: -40px;
      left: 26px
    }

    .cl-b::after {
      width: 60px;
      height: 60px;
      top: -30px;
      left: 76px
    }

    .cl-c {
      width: 290px;
      height: 68px;
      top: 7%;
      left: 74%;
      opacity: .62
    }

    .cl-c::before {
      width: 112px;
      height: 112px;
      top: -58px;
      left: 48px
    }

    .cl-c::after {
      width: 88px;
      height: 88px;
      top: -46px;
      left: 128px
    }

    .cl-d {
      width: 175px;
      height: 43px;
      top: 27%;
      left: 20%;
      opacity: .48
    }

    .cl-d::before {
      width: 68px;
      height: 68px;
      top: -35px;
      left: 21px
    }

    .cl-d::after {
      width: 53px;
      height: 53px;
      top: -27px;
      left: 66px
    }

    .cl-e {
      width: 230px;
      height: 54px;
      top: 14%;
      left: 34%;
      opacity: .58
    }

    .cl-e::before {
      width: 92px;
      height: 92px;
      top: -48px;
      left: 34px
    }

    .cl-e::after {
      width: 72px;
      height: 72px;
      top: -36px;
      left: 99px
    }

    .cl-f {
      width: 155px;
      height: 38px;
      top: 32%;
      left: 60%;
      opacity: .38;
      filter: blur(5px)
    }

    .cl-g {
      width: 205px;
      height: 50px;
      top: 8%;
      left: 17%;
      opacity: .48;
      filter: blur(3px)
    }

    /* ── Mountains ── */
    .mtns {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      z-index: 3;
    }

    .mtns svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Trees ── */
    .trees {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 20%;
      z-index: 4;
      pointer-events: none;
    }

    .trees svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Ground ── */
    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 8%;
      background: linear-gradient(180deg, #0a1a0a 0%, #050d05 100%);
      z-index: 5;
    }

    .ground::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.32), transparent);
    }

    /* ── Airplane ── */
    .plane-wrap {
      position: absolute;
      top: 14%;
      left: -180px;
      z-index: 6;
      animation: fly 28s cubic-bezier(0.25, 0, 0.75, 1) infinite;
    }

    .plane-svg {
      width: 150px;
      height: auto;
      filter: drop-shadow(0 6px 22px rgba(200, 230, 255, 0.45));
      transform: rotate(-5deg);
    }

    @keyframes fly {
      0% {
        left: -180px;
        top: 16%;
        opacity: 0;
      }

      4% {
        opacity: 1;
      }

      40% {
        top: 12%;
      }

      65% {
        top: 14%;
      }

      96% {
        opacity: 1;
      }

      100% {
        left: 110%;
        top: 10%;
        opacity: 0;
      }
    }

    /* ── Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 7;
      background: linear-gradient(160deg,
          rgba(2, 7, 22, 0.55) 0%,
          rgba(10, 20, 55, 0.30) 50%,
          rgba(0, 0, 0, 0.58) 100%);
      pointer-events: none;
    }

    /* ══ STAGE ══ */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ══ CARD ══ */
    .card {
      position: relative;
      width: 100%;
      max-width: 440px;
      padding: 50px 46px 42px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      backdrop-filter: blur(34px) saturate(1.8) brightness(1.06);
      -webkit-backdrop-filter: blur(34px) saturate(1.8) brightness(1.06);
      box-shadow:
        0 14px 64px rgba(0, 0, 0, 0.52),
        0 2px 0 rgba(255, 255, 255, 0.13) inset,
        0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      animation: card-rise 1s var(--ease-spring) both;
    }

    @keyframes card-rise {
      from {
        opacity: 0;
        transform: translateY(44px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Gold shimmer rim */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 18%;
      right: 18%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.78), transparent);
      border-radius: 999px;
    }

    /* Teal bottom glow */
    .card::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 28%;
      right: 28%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(56, 199, 184, 0.42), transparent);
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 28px;
      transition: color .25s var(--ease), gap .25s var(--ease);
      animation: fade-up .7s .1s both;
    }

    .back-link:hover {
      color: rgba(245, 210, 130, 0.85);
      gap: 8px;
    }

    .back-link svg {
      width: 14px;
      height: 14px;
    }

    /* ── Header ── */
    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 34px;
      animation: fade-up .7s .15s both;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-icon {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 12px;
      animation: plane-hover 4s ease-in-out infinite, fade-up .7s .18s both;
      filter: drop-shadow(0 5px 20px rgba(245, 166, 35, 0.52));
    }

    @keyframes plane-hover {

      0%,
      100% {
        transform: translateY(0) rotate(-5deg);
      }

      50% {
        transform: translateY(-8px) rotate(2deg);
      }
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 5vw, 2.2rem);
      font-weight: 900;
      letter-spacing: .01em;
      text-align: center;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 25%, #f5c96a 62%, #f5a623 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Divider ── */
    .div-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      animation: fade-up .7s .22s both;
    }

    .div-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.28), transparent);
    }

    .div-ico {
      color: rgba(245, 166, 35, 0.45);
      font-size: 9px;
      letter-spacing: .1em;
      white-space: nowrap;
    }

    /* ══ FORM ══ */
    .form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Field group ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fade-up .7s both;
    }

    .field-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(220, 195, 145, 0.65);
      padding-left: 4px;
    }

    /* ── Input wrapper ── */
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      width: 17px;
      height: 17px;
      color: rgba(245, 166, 35, 0.5);
      pointer-events: none;
      transition: color .3s var(--ease);
      z-index: 1;
    }

    .input-wrap:focus-within .input-icon {
      color: rgba(245, 166, 35, 0.9);
    }

    .input {
      width: 100%;
      padding: 15px 16px 15px 46px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 14px;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: border-color .3s var(--ease), box-shadow .3s var(--ease), background .3s;
      caret-color: var(--gold);
    }

    .input::placeholder {
      color: rgba(200, 180, 145, 0.38);
      font-weight: 300;
      letter-spacing: .04em;
    }

    .input:focus {
      border-color: rgba(245, 166, 35, 0.55);
      background: rgba(255, 255, 255, 0.09);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.14), 0 4px 20px rgba(245, 166, 35, 0.1);
    }

    /* ── Button ── */
    .btn-reset {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #b8621a 0%, #d98228 40%, #f5a623 78%, #f5c96a 100%);
      color: #1a0900;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .06em;
      overflow: hidden;
      outline: none;
      box-shadow: 0 6px 32px rgba(245, 166, 35, 0.42), 0 2px 10px rgba(0, 0, 0, 0.3);
      transition: transform .3s var(--ease), box-shadow .3s var(--ease);
      margin-top: 10px;
    }

    .btn-reset:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 48px rgba(245, 166, 35, 0.56), 0 4px 18px rgba(0, 0, 0, 0.35);
    }

    .btn-reset:active:not(:disabled) {
      transform: scale(0.97);
    }

    .btn-reset:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    /* Step transition */
    .step {
      display: none;
    }

    .step.active {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ══ TOAST ══ */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: rgba(10, 18, 48, 0.88);
      border: 1px solid rgba(245, 166, 35, 0.28);
      backdrop-filter: blur(22px);
      color: rgba(245, 210, 130, 0.96);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      padding: 13px 30px;
      border-radius: 50px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s, transform .35s var(--ease);
      z-index: 99;
      box-shadow: 0 4px 28px rgba(0, 0, 0, 0.5);
    }

    .toast.on {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      border-color: rgba(56, 199, 184, 0.4);
      color: rgba(100, 230, 210, 0.96);
    }

    @media(max-width:480px) {
      .card {
        padding: 36px 24px 30px;
        border-radius: 24px;
      }
    }
  </style>
  <script
    src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
</head>

<body>

  <!-- ══ SCENE ══ -->
  <div id="scene">
    <canvas id="starCanvas"></canvas>
    <div class="sun"></div>
    <div class="rays" id="rays"></div>

    <!-- Clouds -->
    <div class="cloud-track ct1">
      <div class="cloud cl-a"></div>
      <div class="cloud cl-b"></div>
      <div class="cloud cl-c"></div>
      <div class="cloud cl-f"></div>
      <div class="cloud cl-a" style="left:52%"></div>
      <div class="cloud cl-b" style="left:97%"></div>
      <div class="cloud cl-c" style="left:124%"></div>
    </div>
    <div class="cloud-track ct2">
      <div class="cloud cl-d"></div>
      <div class="cloud cl-e"></div>
      <div class="cloud cl-g"></div>
      <div class="cloud cl-d" style="left:70%"></div>
      <div class="cloud cl-e" style="left:106%"></div>
    </div>
    <div class="cloud-track ct3">
      <div class="cloud cl-f"></div>
      <div class="cloud cl-b" style="left:36%;top:30%"></div>
      <div class="cloud cl-f" style="left:86%"></div>
    </div>

    <!-- Mountains -->
    <div class="mtns">
      <svg viewBox="0 0 1440 380" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="mFar" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1c3066" stop-opacity=".72" />
            <stop offset="100%" stop-color="#080e22" stop-opacity="1" />
          </linearGradient>
          <linearGradient id="mMid" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#122050" stop-opacity=".88" />
            <stop offset="100%" stop-color="#060c18" stop-opacity="1" />
          </linearGradient>
          <linearGradient id="mNear" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0c1830" stop-opacity="1" />
            <stop offset="100%" stop-color="#030810" stop-opacity="1" />
          </linearGradient>
          <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(255,255,255,0.52)" />
            <stop offset="100%" stop-color="rgba(255,255,255,0)" />
          </linearGradient>
        </defs>
        <polygon fill="url(#mFar)"
          points="0,240 80,138 165,192 268,98 375,162 485,78 604,157 724,63 844,147 965,73 1083,157 1204,83 1325,152 1440,98 1440,380 0,380" />
        <polygon fill="url(#snow)" opacity=".68" points="268,98 248,130 288,130" />
        <polygon fill="url(#snow)" opacity=".58" points="485,78 463,116 507,116" />
        <polygon fill="url(#snow)" opacity=".68" points="724,63 702,98 746,98" />
        <polygon fill="url(#snow)" opacity=".58" points="965,73 944,108 986,108" />
        <polygon fill="url(#snow)" opacity=".52" points="1204,83 1183,118 1225,118" />
        <polygon fill="url(#mMid)"
          points="0,278 72,208 152,248 243,183 342,228 452,163 572,223 682,153 803,218 922,158 1042,218 1163,163 1282,218 1382,178 1440,204 1440,380 0,380" />
        <polygon fill="url(#mNear)"
          points="0,318 62,268 142,293 242,248 362,288 482,238 602,278 722,243 842,276 962,243 1082,278 1202,246 1332,273 1440,250 1440,380 0,380" />
      </svg>
    </div>

    <!-- Trees -->
    <div class="trees">
      <svg viewBox="0 0 1440 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="tG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0a1f0a" />
            <stop offset="100%" stop-color="#020602" />
          </linearGradient>
        </defs>
        <g fill="url(#tG)">
          <polygon points="8,160 23,93 38,160" />
          <polygon points="20,160 38,78 56,160" />
          <polygon points="36,160 53,88 70,160" />
          <polygon points="50,160 66,98 82,160" />
          <polygon points="63,160 78,83 93,160" />
          <polygon points="78,160 95,94 112,160" />
          <polygon points="93,160 110,86 127,160" />
          <polygon points="106,160 122,96 138,160" />

    </div>

    <div class="ground"></div>

    <!-- Airplane -->
    <div class="plane-wrap">
      <svg class="plane-svg" viewBox="0 0 130 42" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="58" cy="21" rx="46" ry="9.5" fill="white" opacity=".97" />
        <path d="M104 21C116 21 128 19 128 21C128 23 116 21 104 21Z" fill="white" opacity=".97" />
        <path d="M12 21C8 12 4 7 2 7C4 7 10 12 12 21Z" fill="white" opacity=".92" />
        <path d="M12 21C8 30 4 35 2 35C4 35 10 30 12 21Z" fill="white" opacity=".92" />
        <path d="M64 22C52 38 28 44 14 42C28 37 56 30 64 22Z" fill="white" opacity=".88" />
        <path d="M64 20C52 4 28 -2 14 0C28 5 56 12 64 20Z" fill="white" opacity=".88" />
        <path d="M16 22C12 27 6 29 3 28C7 27 12 25 16 22Z" fill="white" opacity=".82" />

  <div class="overlay"></div>

  <!-- ══ STAGE ══ -->
  <div class="stage">
    <div class="card" id="card">
      <a href="login.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Back to Login
      </a>

      <div class="card-header">
        <div class="header-icon">🔐</div>
        <h1 class="card-title">Reset Password</h1>
        <p class="card-sub" id="subtext">Enter email and new password to update</p>
      </div>

      <!-- Unified Reset Form -->
      <div id="resetForm" class="form">
        <!-- Field: Email -->
        <div class="field" id="emailField">
          <label class="field-label" for="email">Email Address</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input class="input" id="email" type="email" placeholder="you@example.com" />
          </div>
        </div>

        <!-- Field: New Password -->
        <div class="field" id="passField">
          <label class="field-label" for="newPassword">New Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input class="input" id="newPassword" type="password" placeholder="Min 6 characters" />
          </div>
        </div>

        <!-- Field: Verification Code (Initially Hidden) -->
        <div class="field" id="codeField" style="display: none;">
          <label class="field-label" for="verifyCode">Verification Code</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            <input class="input" id="verifyCode" type="text" placeholder="Enter 6-digit code" />
          </div>
        </div>

        <!-- Action Button -->
        <button class="btn-reset" id="sendCodeBtn">
          <span class="btn-text">Update New Password</span>
        </button>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // UI Elements
    const subtext = document.getElementById('subtext');
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('newPassword');
    const sendBtn = document.getElementById('sendCodeBtn');

    // Cognito Configuration
    const poolData = {
      UserPoolId: 'us-east-1_O6KoZw9aK',
      ClientId: '7rg98lb8c2qia8jtlspd8spd15'
    };
    const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

    const codeField = document.getElementById('codeField');
    const codeInput = document.getElementById('verifyCode');
    let isCodeSent = false;

    // Cognito Password Update Flow
    sendBtn.addEventListener('click', () => {
      const email = emailInput.value.trim();
      const newPass = passInput.value;

      if (!email) return showToast('Please enter your registered email');

      if (!isCodeSent) {
        // Step 1: Request Password Reset Code
        sendBtn.disabled = true;
        sendBtn.querySelector('.btn-text').textContent = 'Sending...';

        const userData = { Username: email, Pool: userPool };
        const cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

        cognitoUser.forgotPassword({
          onSuccess: function (data) {
            isCodeSent = true;
            sendBtn.disabled = false;
            sendBtn.querySelector('.btn-text').textContent = 'Confirm New Password';
            codeField.style.display = 'block';
            subtext.textContent = 'Enter the 6-digit code sent to your email';
            showToast('✅ Code sent! Check your inbox.', 'success');
            console.log('Cognito: Verification code sent successfully.');
          },
          onFailure: function (err) {
            sendBtn.disabled = false;
            sendBtn.querySelector('.btn-text').textContent = 'Update New Password';
            showToast('❌ ' + (err.message || 'Could not send code'));
            console.error('Cognito ForgotPassword Error:', err);
          }
        });
      } else {
        // Step 2: Confirm Password with Code
        const code = codeInput.value.trim();
        if (!code) return showToast('Please enter the verification code');
        if (!newPass || newPass.length < 6) return showToast('New password must be at least 6 characters');

        sendBtn.disabled = true;
        sendBtn.querySelector('.btn-text').textContent = 'Updating...';

        const userData = { Username: email, Pool: userPool };
        const cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

        cognitoUser.confirmPassword(code, newPass, {
          onSuccess: function () {
            showToast('✅ Password updated successfully!', 'success');
            console.log('Cognito: Password reset confirmed.');
            setTimeout(() => { window.location.href = 'login.html'; }, 1800);
          },
          onFailure: function (err) {
            sendBtn.disabled = false;
            sendBtn.querySelector('.btn-text').textContent = 'Update New Password';
            showToast('❌ ' + (err.message || 'Update failed'));
            console.error('Cognito ConfirmPassword Error:', err);
          }
        });
      }
    });

    // Toast Function
    let toastT = null;
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      if (toastT) { clearTimeout(toastT); t.classList.remove('on', 'success'); void t.offsetWidth; }
      t.textContent = msg;
      if (type === 'success') t.classList.add('success');
      t.classList.add('on');
      toastT = setTimeout(() => { t.classList.remove('on', 'success'); toastT = null; }, 3000);
    }

    /* ══ Stars Background ══ */
    (function () {
      const c = document.getElementById('starCanvas');
      const ctx = c.getContext('2d');
      let stars = [], W, H;
      function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; build(); }
      function build() {
        stars = [];
        for (let i = 0; i < 85; i++) stars.push({ x: Math.random() * W, y: Math.random() * H * 0.58, r: Math.random() * 1.5 + 0.3, a: Math.random(), da: (Math.random() * .011 + .004) * (Math.random() < .5 ? 1 : -1), maxA: Math.random() * .65 + .3 });
      }
      function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => { s.a += s.da; if (s.a > s.maxA || s.a < 0.05) s.da *= -1; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,245,220,${s.a})`; ctx.fill(); });
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize', resize); resize(); draw();
    })();

    /* ══ Sun rays ══ */
    (function () {
      const w = document.getElementById('rays');
      for (let i = 0; i < 18; i++) {
        const r = document.createElement('div');
        r.className = 'ray';
        r.style.transform = `rotate(${i * 20}deg)`;
        w.appendChild(r);
      }
    })();

    /* ══ Parallax ══ */
    (function () {
      const card = document.getElementById('card');
      let tx = 0, ty = 0, cx = 0, cy = 0;
      document.addEventListener('mousemove', e => {
        tx = ((e.clientX / window.innerWidth) - .5) * 2 * 6;
        ty = ((e.clientY / window.innerHeight) - .5) * 2 * -4.5;
      });
      document.addEventListener('mouseleave', () => { tx = 0; ty = 0; });
      function tick() {
        cx += (tx - cx) * .055; cy += (ty - cy) * .055;
        card.style.transform = `perspective(1000px) rotateY(${cx.toFixed(3)}deg) rotateX(${cy.toFixed(3)}deg)`;
        requestAnimationFrame(tick);
      }
      tick();
      if ('ontouchstart' in window) card.style.transform = 'none';
    })();

    /* ══ Stagger inputs ══ */
    document.querySelectorAll('.field,.btn-reset,.back-link').forEach((el, i) => {
      el.style.opacity = '0'; el.style.transform = 'translateY(12px)';
      setTimeout(() => {
        el.style.transition = 'opacity .45s ease,transform .45s ease';
        el.style.opacity = '1'; el.style.transform = 'translateY(0)';
      }, 700 + i * 90);
    });
  </script>
