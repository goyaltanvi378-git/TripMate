<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>TripMate — Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════
   TRIPMATE — LOGIN PAGE
   Theme: Luminous Dusk · Glassmorphism
══════════════════════════════════════════ */

    :root {
      --sky-top: #04091a;
      --sky-mid: #0d1f4e;
      --sky-lower: #1a4a8a;
      --sky-dusk: #a04010;
      --sky-amber: #f0a34a;
      --sky-peach: #ffd090;
      --gold: #f5a623;
      --gold-light: #f5c96a;
      --gold-dark: #b8621a;
      --teal: #38c7b8;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.16);
      --text-primary: rgba(255, 248, 235, 0.95);
      --text-muted: rgba(220, 200, 165, 0.60);
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(255, 255, 255, 0.14);
      --input-focus: rgba(245, 166, 35, 0.45);
      --error: #ff6b6b;
      --success: #38c7b8;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ── Reset ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ SCENE ══ */
    #scene {
      position: fixed;
      inset: 0;
      background: linear-gradient(175deg,
          var(--sky-top) 0%,
          #0b1a44 28%,
          #153070 50%,
          var(--sky-dusk) 72%,
          var(--sky-amber) 85%,
          var(--sky-peach) 100%);
      overflow: hidden;
    }

    /* ── Star Canvas ── */
    #starCanvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ── Sun ── */
    .sun {
      position: absolute;
      bottom: 28%;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe9a0 0%, #f5a623 42%, rgba(240, 120, 30, 0) 72%);
      box-shadow: 0 0 70px 38px rgba(245, 166, 35, 0.26), 0 0 150px 75px rgba(240, 100, 10, 0.11);
      animation: sun-pulse 8s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes sun-pulse {

      0%,
      100% {
        transform: translateX(-50%) scale(1);
        box-shadow: 0 0 70px 38px rgba(245, 166, 35, 0.26), 0 0 150px 75px rgba(240, 100, 10, 0.11);
      }

      50% {
        transform: translateX(-50%) scale(1.1);
        box-shadow: 0 0 100px 52px rgba(245, 166, 35, 0.36), 0 0 190px 95px rgba(240, 100, 10, 0.16);
      }
    }

    /* ── Rays ── */
    .rays {
      position: absolute;
      bottom: 28%;
      left: 50%;
      width: 360px;
      height: 360px;
      margin-left: -180px;
      margin-bottom: -180px;
      z-index: 0;
      opacity: 0.07;
      animation: spin-rays 70s linear infinite;
    }

    .ray {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 180px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255, 220, 100, 0.9), transparent);
      transform-origin: left center;
    }

    @keyframes spin-rays {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* ── Clouds ── */
    .cloud-track {
      position: absolute;
      top: 0;
      left: 0;
      width: 250%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .ct1 {
      animation: drift 95s linear infinite;
    }

    .ct2 {
      animation: drift 135s linear infinite;
      animation-delay: -45s;
    }

    .ct3 {
      animation: drift 75s linear infinite;
      animation-delay: -18s;
      opacity: .5;
    }

    @keyframes drift {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    .cloud {
      position: absolute;
      border-radius: 60px;
      background: rgba(255, 255, 255, 0.78);
      filter: blur(3px);
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .cl-a {
      width: 250px;
      height: 60px;
      top: 10%;
      left: 5%
    }

    .cl-a::before {
      width: 105px;
      height: 105px;
      top: -54px;
      left: 38px
    }

    .cl-a::after {
      width: 82px;
      height: 82px;
      top: -42px;
      left: 108px
    }

    .cl-b {
      width: 190px;
      height: 48px;
      top: 20%;
      left: 47%;
      opacity: .7
    }

    .cl-b::before {
      width: 76px;
      height: 76px;
      top: -40px;
      left: 26px
    }

    .cl-b::after {
      width: 60px;
      height: 60px;
      top: -30px;
      left: 76px
    }

    .cl-c {
      width: 290px;
      height: 68px;
      top: 7%;
      left: 74%;
      opacity: .62
    }

    .cl-c::before {
      width: 112px;
      height: 112px;
      top: -58px;
      left: 48px
    }

    .cl-c::after {
      width: 88px;
      height: 88px;
      top: -46px;
      left: 128px
    }

    .cl-d {
      width: 175px;
      height: 43px;
      top: 27%;
      left: 20%;
      opacity: .48
    }

    .cl-d::before {
      width: 68px;
      height: 68px;
      top: -35px;
      left: 21px
    }

    .cl-d::after {
      width: 53px;
      height: 53px;
      top: -27px;
      left: 66px
    }

    .cl-e {
      width: 230px;
      height: 54px;
      top: 14%;
      left: 34%;
      opacity: .58
    }

    .cl-e::before {
      width: 92px;
      height: 92px;
      top: -48px;
      left: 34px
    }

    .cl-e::after {
      width: 72px;
      height: 72px;
      top: -36px;
      left: 99px
    }

    .cl-f {
      width: 155px;
      height: 38px;
      top: 32%;
      left: 60%;
      opacity: .38;
      filter: blur(5px)
    }

    .cl-g {
      width: 205px;
      height: 50px;
      top: 8%;
      left: 17%;
      opacity: .48;
      filter: blur(3px)
    }

    /* ── Mountains ── */
    .mtns {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      z-index: 3;
    }

    .mtns svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Trees ── */
    .trees {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 20%;
      z-index: 4;
      pointer-events: none;
    }

    .trees svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Ground ── */
    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 8%;
      background: linear-gradient(180deg, #0a1a0a 0%, #050d05 100%);
      z-index: 5;
    }

    .ground::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.32), transparent);
    }

    /* ── Airplane ── */
    .plane-wrap {
      position: absolute;
      top: 14%;
      left: -180px;
      z-index: 6;
      animation: fly 28s cubic-bezier(0.25, 0, 0.75, 1) infinite;
    }

    .plane-svg {
      width: 150px;
      height: auto;
      filter: drop-shadow(0 6px 22px rgba(200, 230, 255, 0.45));
      transform: rotate(-5deg);
    }

    @keyframes fly {
      0% {
        left: -180px;
        top: 16%;
        opacity: 0;
      }

      4% {
        opacity: 1;
      }

      40% {
        top: 12%;
      }

      65% {
        top: 14%;
      }

      96% {
        opacity: 1;
      }

      100% {
        left: 110%;
        top: 10%;
        opacity: 0;
      }
    }

    /* ── Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 7;
      background: linear-gradient(160deg,
          rgba(2, 7, 22, 0.55) 0%,
          rgba(10, 20, 55, 0.30) 50%,
          rgba(0, 0, 0, 0.58) 100%);
      pointer-events: none;
    }

    /* ══ STAGE ══ */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ══ LOGIN CARD ══ */
    .card {
      position: relative;
      width: 100%;
      max-width: 440px;
      padding: 50px 46px 42px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      backdrop-filter: blur(34px) saturate(1.8) brightness(1.06);
      -webkit-backdrop-filter: blur(34px) saturate(1.8) brightness(1.06);
      box-shadow:
        0 14px 64px rgba(0, 0, 0, 0.52),
        0 2px 0 rgba(255, 255, 255, 0.13) inset,
        0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      animation: card-rise 1s var(--ease-spring) both;
    }

    @keyframes card-rise {
      from {
        opacity: 0;
        transform: translateY(44px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Gold shimmer rim */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 18%;
      right: 18%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.78), transparent);
      border-radius: 999px;
    }

    /* Teal bottom glow */
    .card::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 28%;
      right: 28%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(56, 199, 184, 0.42), transparent);
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 28px;
      transition: color .25s var(--ease), gap .25s var(--ease);
      animation: fade-up .7s .1s both;
    }

    .back-link:hover {
      color: rgba(245, 210, 130, 0.85);
      gap: 8px;
    }

    .back-link svg {
      width: 14px;
      height: 14px;
    }

    /* ── Header ── */
    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 34px;
      animation: fade-up .7s .15s both;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-icon {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 12px;
      animation: plane-hover 4s ease-in-out infinite, fade-up .7s .18s both;
      filter: drop-shadow(0 5px 20px rgba(245, 166, 35, 0.52));
    }

    @keyframes plane-hover {

      0%,
      100% {
        transform: translateY(0) rotate(-5deg);
      }

      50% {
        transform: translateY(-8px) rotate(2deg);
      }
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 5vw, 2.2rem);
      font-weight: 900;
      letter-spacing: .01em;
      text-align: center;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 25%, #f5c96a 62%, #f5a623 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Divider ── */
    .div-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      animation: fade-up .7s .22s both;
    }

    .div-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.28), transparent);
    }

    .div-ico {
      color: rgba(245, 166, 35, 0.45);
      font-size: 9px;
      letter-spacing: .1em;
      white-space: nowrap;
    }

    /* ══ FORM ══ */
    .form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Field group ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fade-up .7s both;
    }

    .field:nth-child(1) {
      animation-delay: .26s;
    }

    .field:nth-child(2) {
      animation-delay: .32s;
    }

    .field:nth-child(3) {
      animation-delay: .38s;
    }

    .field-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(220, 195, 145, 0.65);
      padding-left: 4px;
    }

    /* ── Input wrapper ── */
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      width: 17px;
      height: 17px;
      color: rgba(245, 166, 35, 0.5);
      pointer-events: none;
      transition: color .3s var(--ease);
      z-index: 1;
    }

    .input-wrap:focus-within .input-icon {
      color: rgba(245, 166, 35, 0.9);
    }

    .input {
      width: 100%;
      padding: 15px 16px 15px 46px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 14px;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: border-color .3s var(--ease), box-shadow .3s var(--ease), background .3s;
      caret-color: var(--gold);
    }

    .input::placeholder {
      color: rgba(200, 180, 145, 0.38);
      font-weight: 300;
      letter-spacing: .04em;
    }

    .input:focus {
      border-color: rgba(245, 166, 35, 0.55);
      background: rgba(255, 255, 255, 0.09);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.14), 0 4px 20px rgba(245, 166, 35, 0.1);
    }

    .input.error {
      border-color: rgba(255, 107, 107, 0.6);
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.12);
    }

    .input.valid {
      border-color: rgba(56, 199, 184, 0.5);
      box-shadow: 0 0 0 3px rgba(56, 199, 184, 0.1);
    }

    /* ── Password toggle ── */
    .pw-toggle {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: rgba(200, 180, 145, 0.45);
      transition: color .25s;
      display: flex;
      align-items: center;
      z-index: 1;
    }

    .pw-toggle:hover {
      color: rgba(245, 166, 35, 0.8);
    }

    .pw-toggle svg {
      width: 16px;
      height: 16px;
    }

    /* ── Field message ── */
    .field-msg {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: .06em;
      min-height: 14px;
      padding-left: 4px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity .25s, transform .25s;
    }

    .field-msg.show {
      opacity: 1;
      transform: translateY(0);
    }

    .field-msg.err {
      color: var(--error);
    }

    .field-msg.ok {
      color: var(--success);
    }

    /* ── Options row ── */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
      margin-bottom: 6px;
      animation: fade-up .7s .40s both;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .remember input[type=checkbox] {
      display: none;
    }

    .check-box {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      border: 1.5px solid rgba(245, 166, 35, 0.3);
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .25s, background .25s, box-shadow .25s;
      flex-shrink: 0;
    }

    .remember:hover .check-box {
      border-color: rgba(245, 166, 35, 0.55);
    }

    .remember input:checked+.check-box {
      background: linear-gradient(135deg, #b8621a, #f5a623);
      border-color: transparent;
      box-shadow: 0 2px 10px rgba(245, 166, 35, 0.35);
    }

    .check-tick {
      width: 9px;
      height: 9px;
      color: white;
      display: none;
    }

    .remember input:checked~.check-tick,
    .remember input:checked+.check-box .check-tick {
      display: block;
    }

    .remember-label {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: .04em;
      color: rgba(210, 190, 155, 0.6);
      user-select: none;
    }

    .forgot {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: .04em;
      color: rgba(245, 166, 35, 0.65);
      text-decoration: none;
      transition: color .25s;
    }

    .forgot:hover {
      color: rgba(245, 200, 90, 0.95);
    }

    /* ══ LOGIN BUTTON ══ */
    .btn-login {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #b8621a 0%, #d98228 40%, #f5a623 78%, #f5c96a 100%);
      color: #1a0900;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .06em;
      overflow: hidden;
      outline: none;
      box-shadow: 0 6px 32px rgba(245, 166, 35, 0.42), 0 2px 10px rgba(0, 0, 0, 0.3);
      transition: transform .3s var(--ease), box-shadow .3s var(--ease);
      animation: fade-up .7s .44s both;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 48px rgba(245, 166, 35, 0.56), 0 4px 18px rgba(0, 0, 0, 0.35);
    }

    .btn-login:active:not(:disabled) {
      transform: scale(0.97);
    }

    .btn-login:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    /* Shine sweep */
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 38%, rgba(255, 255, 255, 0.22) 50%, transparent 62%);
      opacity: 0;
      transition: opacity .4s;
    }

    .btn-login:hover::before {
      opacity: 1;
      animation: shine-sweep .5s ease forwards;
    }

    @keyframes shine-sweep {
      from {
        background-position: -200% 0;
      }

      to {
        background-position: 200% 0;
      }
    }

    .btn-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .btn-text {
      position: relative;
      z-index: 1;
    }

    /* Loading spinner inside button */
    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(26, 9, 0, 0.3);
      border-top-color: #1a0900;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .btn-login.loading .btn-icon,
    .btn-login.loading .btn-text {
      display: none;
    }

    .btn-login.loading .btn-spinner {
      display: block;
    }

    /* ── Divider ── */
    .or-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
      animation: fade-up .7s .48s both;
    }

    .or-line {
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .or-text {
      font-size: 10px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(200, 180, 145, 0.35);
    }

    /* ── Social buttons ── */
    .social-row {
      display: flex;
      gap: 10px;
      animation: fade-up .7s .52s both;
    }

    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(220, 205, 175, 0.75);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: .06em;
      cursor: pointer;
      outline: none;
      transition: background .28s, border-color .28s, transform .28s var(--ease), color .28s;
      backdrop-filter: blur(8px);
    }

    .btn-social svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .btn-social:hover {
      background: rgba(255, 255, 255, 0.10);
      border-color: rgba(255, 255, 255, 0.22);
      color: rgba(245, 230, 200, 0.95);
      transform: translateY(-2px);
    }

    .btn-social:active {
      transform: scale(0.97);
    }

    /* ── Sign up footer ── */
    .signup-row {
      text-align: center;
      margin-top: 2px;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: .05em;
      color: rgba(200, 180, 145, 0.5);
      animation: fade-up .7s .56s both;
    }

    .signup-link {
      color: rgba(245, 166, 35, 0.75);
      text-decoration: none;
      font-weight: 500;
      transition: color .25s;
    }

    .signup-link:hover {
      color: rgba(245, 200, 90, 0.98);
    }

    /* ── Card footer ── */
    .card-foot {
      margin-top: 22px;
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 10px;
      letter-spacing: .18em;
      color: rgba(185, 165, 125, 0.38);
      animation: fade-up .7s .60s both;
    }

    /* ══ TOAST ══ */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: rgba(10, 18, 48, 0.88);
      border: 1px solid rgba(245, 166, 35, 0.28);
      backdrop-filter: blur(22px);
      color: rgba(245, 210, 130, 0.96);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: .04em;
      padding: 13px 30px;
      border-radius: 50px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s, transform .35s var(--ease);
      white-space: nowrap;
      z-index: 99;
      box-shadow: 0 4px 28px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(245, 166, 35, 0.1) inset;
    }

    .toast.on {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      border-color: rgba(56, 199, 184, 0.4);
      color: rgba(100, 230, 210, 0.96);
    }

    /* ══ RESPONSIVE ══ */
    @media(max-width:480px) {
      .card {
        padding: 36px 24px 30px;
        border-radius: 24px;
      }

      .card-title {
        font-size: 1.6rem;
      }

      .social-row {
        flex-direction: column;
      }
    }

    @media(max-height:680px) {
      .card {
        padding: 28px 36px 24px;
      }

      .card-header {
        margin-bottom: 20px;
      }

      .header-icon {
        font-size: 38px;
        margin-bottom: 8px;
      }

      .div-row {
        margin-bottom: 18px;
      }

      .form {
        gap: 12px;
      }

      .options-row {
        margin-top: 0;
        margin-bottom: 2px;
      }

      .or-row,
      .social-row {
        display: none;
      }

      .card-foot {
        margin-top: 14px;
      }
    }
  </style>
</head>

        <!-- Password -->
        <div class="field" id="pwField">

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    /* ══ Stars ══ */
    (function () {
      const c = document.getElementById('starCanvas');
      const ctx = c.getContext('2d');
      let stars = [], W, H;
      function resize() {
        W = c.width = window.innerWidth; H = c.height = window.innerHeight; build();
      }
      function build() {
        stars = [];
        for (let i = 0; i < 85; i++) stars.push({
          x: Math.random() * W, y: Math.random() * H * 0.58,
          r: Math.random() * 1.5 + 0.3,
          a: Math.random(),
          da: (Math.random() * .011 + .004) * (Math.random() < .5 ? 1 : -1),
          maxA: Math.random() * .65 + .3
        });
      }
      function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
          s.a += s.da;
          if (s.a > s.maxA || s.a < 0.05) s.da *= -1;
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,245,220,${s.a})`; ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize', resize);
      resize(); draw();
    })();

    /* ══ Sun rays ══ */
    (function () {
      const w = document.getElementById('rays');
      for (let i = 0; i < 18; i++) {
        const r = document.createElement('div');
        r.className = 'ray';
        r.style.transform = `rotate(${i * 20}deg)`;
        w.appendChild(r);
      }
    })();

    /* ══ Parallax ══ */
    (function () {
      const card = document.getElementById('card');
      let tx = 0, ty = 0, cx = 0, cy = 0;
      document.addEventListener('mousemove', e => {
        tx = ((e.clientX / window.innerWidth) - .5) * 2 * 6;
        ty = ((e.clientY / window.innerHeight) - .5) * 2 * -4.5;
      });
      document.addEventListener('mouseleave', () => { tx = 0; ty = 0; });
      function tick() {
        cx += (tx - cx) * .055; cy += (ty - cy) * .055;
        card.style.transform = `perspective(1000px) rotateY(${cx.toFixed(3)}deg) rotateX(${cy.toFixed(3)}deg)`;
        requestAnimationFrame(tick);
      }
      tick();
      if ('ontouchstart' in window) card.style.transform = 'none';
    })();

    /* ══ Password toggle ══ */
    const pwInput = document.getElementById('password');
    const eyeOpen = document.getElementById('eyeOpen');
    const eyeClosed = document.getElementById('eyeClosed');
    document.getElementById('pwToggle').addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      eyeOpen.style.display = show ? 'none' : 'block';
      eyeClosed.style.display = show ? 'block' : 'none';
    });

    /* ══ Real-time validation ══ */
    function setFieldState(fieldId, msgId, state, msg) {
      const f = document.getElementById(fieldId);
      const inp = f.querySelector('.input');
      const m = document.getElementById(msgId);
      inp.classList.remove('error', 'valid');
      m.classList.remove('show', 'err', 'ok');
      if (state === 'error') { inp.classList.add('error'); m.classList.add('show', 'err'); }
      if (state === 'valid') { inp.classList.add('valid'); m.classList.add('show', 'ok'); }
      m.textContent = msg || '';
    }
    function validateEmail(v) {
      if (!v) return { ok: false, msg: 'Email is required' };
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return { ok: false, msg: 'Please enter a valid email' };
      return { ok: true, msg: '✓ Looks good!' };
    }
    function validatePassword(v) {
      if (!v) return { ok: false, msg: 'Password is required' };
      if (v.length < 6) return { ok: false, msg: 'Password must be at least 6 characters' };
      return { ok: true, msg: '✓ Password entered' };
    }
    document.getElementById('email').addEventListener('blur', function () {
      const r = validateEmail(this.value.trim());
      setFieldState('emailField', 'emailMsg', r.ok ? 'valid' : 'error', r.msg);
    });
    document.getElementById('email').addEventListener('input', function () {
      if (this.classList.contains('error') || this.classList.contains('valid')) {
        const r = validateEmail(this.value.trim());
        setFieldState('emailField', 'emailMsg', r.ok ? 'valid' : 'error', r.msg);
      }
    });
    document.getElementById('password').addEventListener('blur', function () {
      const r = validatePassword(this.value);
      setFieldState('pwField', 'pwMsg', r.ok ? 'valid' : 'error', r.msg);
    });
    document.getElementById('password').addEventListener('input', function () {
      if (this.classList.contains('error') || this.classList.contains('valid')) {
        const r = validatePassword(this.value);
        setFieldState('pwField', 'pwMsg', r.ok ? 'valid' : 'error', r.msg);
      }
    });

    /* ══ Form submit ══ */
    document.getElementById('signupForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      const eRes = validateEmail(email);
      const pRes = validatePassword(pw);
      setFieldState('emailField', 'emailMsg', eRes.ok ? 'valid' : 'error', eRes.msg);
      setFieldState('pwField', 'pwMsg', pRes.ok ? 'valid' : 'error', pRes.msg);
      if (!eRes.ok || !pRes.ok) return;

      const btn = document.getElementById('signupBtn');
      btn.classList.add('loading'); btn.disabled = true;

      try {
        const response = await fetch("https://6lwgxxxfac.execute-api.us-east-1.amazonaws.com/auth", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: email,
            password: pw
          })
        });

        const result = await response.json();

        btn.classList.remove('loading');
        btn.disabled = false;

        if (response.ok) {
          showToast('✈️ signup Successful!', 'success');

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);

        } else {
          showToast('❌ Invalid signup');
        }

      } catch (error) {
        btn.classList.remove('loading');
        btn.disabled = false;
        showToast('⚠️ Server Error');
        console.log(error);
      }
    });

    /* ══ Toast ══ */
    let toastT = null;
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      if (toastT) { clearTimeout(toastT); t.classList.remove('on', 'success'); void t.offsetWidth; }
      t.textContent = msg;
      if (type === 'success') t.classList.add('success');
      t.classList.add('on');
      toastT = setTimeout(() => { t.classList.remove('on', 'success'); toastT = null; }, 2800);
    }

    /* ══ Stagger inputs ══ */
    document.querySelectorAll('.field,.options-row,.btn-signup,.or-row,.social-row,.signup-row').forEach((el, i) => {
      el.style.opacity = '0'; el.style.transform = 'translateY(12px)';
      setTimeout(() => {
        el.style.transition = 'opacity .45s ease,transform .45s ease';
        el.style.opacity = '1'; el.style.transform = 'translateY(0)';
      }, 700 + i * 90);
    });
  </script>
  <script src="script.js"></script>
</body>
