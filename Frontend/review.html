<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>TripMate — Review Trip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        /* ══════════════════════════════════════════
   TRIPMATE — GENERAL Theme: Luminous Dusk · Glassmorphism
══════════════════════════════════════════ */

        :root {
            --sky-top: #04091a;
            --sky-mid: #0d1f4e;
            --sky-lower: #1a4a8a;
            --sky-dusk: #a04010;
            --sky-amber: #f0a34a;
            --sky-peach: #ffd090;
            --gold: #f5a623;
            --gold-light: #f5c96a;
            --gold-dark: #b8621a;
            --teal: #38c7b8;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.16);
            --text-primary: rgba(255, 248, 235, 0.95);
            --text-muted: rgba(220, 200, 165, 0.60);
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.14);
            --input-focus: rgba(245, 166, 35, 0.45);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ── Reset ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ══ SCENE ══ */
        #scene {
            position: fixed;
            inset: 0;
            background: linear-gradient(175deg,
                    var(--sky-top) 0%,
                    #0b1a44 28%,
                    #153070 50%,
                    var(--sky-dusk) 72%,
                    var(--sky-amber) 85%,
                    var(--sky-peach) 100%);
            overflow: hidden;
        }

        /* ── Star Canvas ── */
        #starCanvas {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* ── Sun ── */
        .sun {
            position: absolute;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffe9a0 0%, #f5a623 42%, rgba(240, 120, 30, 0) 72%);
            box-shadow: 0 0 70px 38px rgba(245, 166, 35, 0.26), 0 0 150px 75px rgba(240, 100, 10, 0.11);
            animation: sun-pulse 8s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes sun-pulse {

            0%,
            100% {
                transform: translateX(-50%) scale(1);
                box-shadow: 0 0 70px 38px rgba(245, 166, 35, 0.26), 0 0 150px 75px rgba(240, 100, 10, 0.11);
            }

            50% {
                transform: translateX(-50%) scale(1.1);
                box-shadow: 0 0 100px 52px rgba(245, 166, 35, 0.36), 0 0 190px 95px rgba(240, 100, 10, 0.16);
            }
        }

        /* ── Clouds ── */
        .cloud-track {
            position: absolute;
            top: 0;
            left: 0;
            width: 250%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .ct1 {
            animation: drift 95s linear infinite;
        }

        .ct2 {
            animation: drift 135s linear infinite;
            animation-delay: -45s;
        }

        .ct3 {
            animation: drift 75s linear infinite;
            animation-delay: -18s;
            opacity: .5;
        }

        @keyframes drift {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        .cloud {
            position: absolute;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.78);
            filter: blur(3px);
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .cl-a {
            width: 250px;
            height: 60px;
            top: 10%;
            left: 5%
        }

        .cl-a::before {
            width: 105px;
            height: 105px;
            top: -54px;
            left: 38px
        }

        .cl-a::after {
            width: 82px;
            height: 82px;
            top: -42px;
            left: 108px
        }

        .cl-b {
            width: 190px;
            height: 48px;
            top: 20%;
            left: 47%;
            opacity: .7
        }

        .cl-b::before {
            width: 76px;
            height: 76px;
            top: -40px;
            left: 26px
        }

        .cl-b::after {
            width: 60px;
            height: 60px;
            top: -30px;
            left: 76px
        }

        .cl-c {
            width: 290px;
            height: 68px;
            top: 7%;
            left: 74%;
            opacity: .62
        }

        .cl-c::before {
            width: 112px;
            height: 112px;
            top: -58px;
            left: 48px
        }

        .cl-c::after {
            width: 88px;
            height: 88px;
            top: -46px;
            left: 128px
        }

        /* ── Mountains ── */
        .mtns {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 3;
        }

        .mtns svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Trees ── */
        .trees {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20%;
            z-index: 4;
            pointer-events: none;
        }

        .trees svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Ground ── */
        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8%;
            background: linear-gradient(180deg, #0a1a0a 0%, #050d05 100%);
            z-index: 5;
        }

        .ground::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.32), transparent);
        }

        /* ── Airplane ── */
        .plane-wrap {
            position: absolute;
            top: 14%;
            left: -180px;
            z-index: 6;
            animation: fly 28s cubic-bezier(0.25, 0, 0.75, 1) infinite;
        }

        .plane-svg {
            width: 150px;
            height: auto;
            filter: drop-shadow(0 6px 22px rgba(200, 230, 255, 0.45));
            transform: rotate(-5deg);
        }

        @keyframes fly {
            0% {
                left: -180px;
                top: 16%;
                opacity: 0;
            }

            4% {
                opacity: 1;
            }

            40% {
                top: 12%;
            }

            65% {
                top: 14%;
            }

            96% {
                opacity: 1;
            }

            100% {
                left: 110%;
                top: 10%;
                opacity: 0;
            }
        }

        /* ── Overlay ── */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 7;
            background: linear-gradient(160deg,
                    rgba(2, 7, 22, 0.55) 0%,
                    rgba(10, 20, 55, 0.30) 50%,
                    rgba(0, 0, 0, 0.58) 100%);
            pointer-events: none;
        }

        /* ══ STAGE ══ */
        .stage {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ══ CARD ══ */
        .card {
            position: relative;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 50px 46px 42px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            backdrop-filter: blur(34px) saturate(1.8) brightness(1.06);
            -webkit-backdrop-filter: blur(34px) saturate(1.8) brightness(1.06);
            box-shadow:
                0 14px 64px rgba(0, 0, 0, 0.52),
                0 2px 0 rgba(255, 255, 255, 0.13) inset,
                0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            animation: card-rise 1s var(--ease-spring) both;
        }

        .card::-webkit-scrollbar {
            width: 6px;
        }

        .card::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        @keyframes card-rise {
            from {
                opacity: 0;
                transform: translateY(44px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 18%;
            right: 18%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.78), transparent);
            border-radius: 999px;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 28%;
            right: 28%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(56, 199, 184, 0.42), transparent);
        }

        /* ── Back link ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 28px;
            transition: color .25s var(--ease), gap .25s var(--ease);
            animation: fade-up .7s .1s both;
        }

        .back-link:hover {
            color: rgba(245, 210, 130, 0.85);
            gap: 8px;
        }

        .back-link svg {
            width: 14px;
            height: 14px;
        }

        /* ── Header ── */
        .card-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 34px;
            animation: fade-up .7s .15s both;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-icon {
            font-size: 48px;
            line-height: 1;
            margin-bottom: 12px;
            filter: drop-shadow(0 5px 20px rgba(245, 166, 35, 0.52));
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.7rem, 5vw, 2.2rem);
            font-weight: 900;
            letter-spacing: .01em;
            text-align: center;
            line-height: 1.1;
            background: linear-gradient(135deg, #fff 25%, #f5c96a 62%, #f5a623 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .card-sub {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* ── Divider ── */
        .div-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            animation: fade-up .7s .22s both;
        }

        .div-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.28), transparent);
        }

        .div-ico {
            color: rgba(245, 166, 35, 0.45);
            font-size: 9px;
            letter-spacing: .1em;
            white-space: nowrap;
        }

        /* ══ FORM ══ */
        .form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: fade-up .7s .3s both;
        }

        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: rgba(220, 195, 145, 0.65);
            padding-left: 4px;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input {
            width: 100%;
            padding: 15px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 400;
            outline: none;
            transition: border-color .3s var(--ease), box-shadow .3s var(--ease), background .3s;
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
        }

        .input::placeholder {
            color: rgba(200, 180, 145, 0.38);
            font-weight: 300;
        }

        .input:focus {
            border-color: rgba(245, 166, 35, 0.55);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.14);
        }

        /* ══ BUTTON ══ */
        .btn-login {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            background: linear-gradient(135deg, #b8621a 0%, #d98228 40%, #f5a623 78%, #f5c96a 100%);
            color: #1a0900;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: .06em;
            box-shadow: 0 6px 32px rgba(245, 166, 35, 0.42), 0 2px 10px rgba(0, 0, 0, 0.3);
            transition: transform .3s var(--ease), box-shadow .3s var(--ease);
            outline: none;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 48px rgba(245, 166, 35, 0.56), 0 4px 18px rgba(0, 0, 0, 0.35);
        }

        .btn-login:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.13);
            color: rgba(220, 205, 175, 0.85);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.10);
            border-color: rgba(255, 255, 255, 0.22);
            color: rgba(245, 230, 200, 0.95);
            box-shadow: none;
        }

        .status-msg {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
        }

        .status-msg.success {
            color: var(--teal);
        }

        .status-msg.error {
            color: #ff6b6b;
        }
    </style>
</head>

<body>

    <!-- ══ SCENE ══ -->
    <div id="scene">
        <canvas id="starCanvas"></canvas>
        <div class="sun"></div>
        <div class="cloud-track ct1">
            <div class="cloud cl-a"></div>
            <div class="cloud cl-b"></div>
            <div class="cloud cl-c"></div>
            <div class="cloud cl-f"></div>

        <div class="ground"></div>

        <!-- Airplane -->

    <div class="overlay"></div>

    <!-- ══ STAGE ══ -->
    <div class="stage">
        <div class="card" id="card">

            <a href="Itinerary.html" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
                Back to Itinerary
            </a>

            <!-- Header -->
            <div class="card-header">
                <div class="header-icon">👁️</div>
                <h1 class="card-title">Review Trip Details</h1>
                <p class="card-sub">Look over your data before finishing</p>
            </div>

            <!-- Divider -->
            <div class="div-row">
                <span class="div-line"></span>
                <span class="div-ico">◆ &nbsp; TRIP INFORMATION &nbsp; ◆</span>
                <span class="div-line"></span>
            </div>

            <div class="form">
                <div class="field">
                    <label class="field-label">Trip Name</label>
                    <div class="input-wrap">
                        <input type="text" class="input" id="tripName" placeholder="e.g. Golden Triangle India">
                    </div>
                </div>

                <div class="field">
                    <label class="field-label">Destination</label>
                    <div class="input-wrap">
                        <input type="text" class="input" id="destination" placeholder="e.g. Paris, France">
                    </div>
                </div>

                <div class="field">
                    <label class="field-label">Budget (Rs.)</label>
                    <div class="input-wrap">
                        <input type="number" class="input" id="budget" placeholder="0">
                    </div>
                </div>

                <div class="date-row">
                    <div class="field">
                        <label class="field-label">Departure Date</label>
                        <div class="input-wrap">
                            <input type="date" class="input" id="startDate">
                        </div>
                    </div>
                    <div class="field">
                        <label class="field-label">Return Date</label>
                        <div class="input-wrap">
                            <input type="date" class="input" id="endDate">
                        </div>
                    </div>
                </div>

                <button class="btn-login" onclick="updateTrip()">
                    <span class="btn-text">Save Changes & Finish</span>
                </button>

                <p id="msg" class="status-msg"></p>

                <button class="btn-login btn-secondary" id="viewTripBtn" style="display: none; margin-top: 5px;"
                    onclick="window.location.href='view-trips.html'">
                    <span class="btn-text" style="color: inherit">View Trip</span>
                </button>

            </div>

        </div>
    </div>

    <script src="script.js"></script>
    <script>
        /* ══ Stars ══ */
        (function () {
            const c = document.getElementById('starCanvas');
            const ctx = c.getContext('2d');
            let stars = [], W, H;
            function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; build(); }
            function build() {
                stars = [];
                for (let i = 0; i < 85; i++) stars.push({
                    x: Math.random() * W, y: Math.random() * H * 0.58,
                    r: Math.random() * 1.5 + 0.3, a: Math.random(),
                    da: (Math.random() * .011 + .004) * (Math.random() < .5 ? 1 : -1),
                    maxA: Math.random() * .65 + .3
                });
            }
            function draw() {
                ctx.clearRect(0, 0, W, H);
                stars.forEach(s => {
                    s.a += s.da;
                    if (s.a > s.maxA || s.a < 0.05) s.da *= -1;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,245,220,${s.a})`; ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            window.addEventListener('resize', resize);
            resize(); draw();
        })();

        /* ══ Logic ══ */
        window.onload = function () {
            try {
                let trip = JSON.parse(localStorage.getItem("tripData"));
                if (trip) {
                    if (trip.tripName) document.getElementById("tripName").value = trip.tripName;
                    if (trip.destination) document.getElementById("destination").value = trip.destination;
                    if (trip.budget) document.getElementById("budget").value = trip.budget;
                    if (trip.startDate) document.getElementById("startDate").value = trip.startDate;
                    if (trip.endDate) document.getElementById("endDate").value = trip.endDate;
                }
            } catch (e) { }
        };

        function updateTrip() {
            let msg = document.getElementById("msg");

            let tName = document.getElementById("tripName").value.trim();
            let tDest = document.getElementById("destination").value.trim();
            let tStart = document.getElementById("startDate").value;
            let tEnd = document.getElementById("endDate").value;
            let tBudget = document.getElementById("budget").value;

            if (!tName || !tDest || !tStart || !tEnd) {
                msg.innerText = "❌ Please fill all required fields!";
                msg.classList.remove('success');
                msg.classList.add('error');
                return;
            }

            const tripData = {
                tripName: tName,
                destination: tDest,
                startDate: tStart,
                endDate: tEnd,
                budget: tBudget
            };

            localStorage.setItem("tripData", JSON.stringify(tripData));

            msg.innerText = "✅ Your trip created successfully!";
            msg.classList.remove('error');
            msg.classList.add('success');

            document.getElementById("viewTripBtn").style.display = "flex";

            // Scroll down smoothly if needed
            setTimeout(() => {
                const card = document.querySelector('.card');
                card.scrollTo({ top: card.scrollHeight, behavior: 'smooth' });
            }, 100);
        }
    </script>
</body>

</html>
