<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>TripMate — View Trips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════
   TRIPMATE — VIEW TRIPS PAGE
   Theme: Luminous Dusk · Glassmorphism Grid
══════════════════════════════════════════ */

    :root {
      --sky-top: #04091a;
      --sky-mid: #0d1f4e;
      --sky-dusk: #a04010;
      --sky-amber: #f0a34a;
      --sky-peach: #ffd090;
      --gold: #f5a623;
      --gold-light: #f5c96a;
      --gold-dark: #b8621a;
      --teal: #38c7b8;
      --rose: #e8607a;
      --violet: #8b6fd4;
      --glass: rgba(255, 255, 255, 0.07);
      --glass-b: rgba(255, 255, 255, 0.15);
      --text-primary: rgba(255, 248, 235, 0.95);
      --text-muted: rgba(220, 200, 165, 0.58);
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --spring: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      width: 100%;
      height: 100%;
      scroll-behavior: smooth
    }

    body {
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      background: linear-gradient(175deg,
          var(--sky-top) 0%, #0b1a44 25%, #153070 48%,
          var(--sky-dusk) 70%, var(--sky-amber) 84%, var(--sky-peach) 100%);
    }

    /* ══ FIXED SCENE ══ */
    #scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    /* ── Stars ── */
    #starCanvas {
      position: absolute;
      inset: 0;
      z-index: 0
    }

    /* ── Orbs ── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      z-index: 0;
      animation: orb-drift var(--dur, 14s) ease-in-out infinite
    }

    .orb1 {
      width: 300px;
      height: 300px;
      background: rgba(245, 166, 35, .07);
      top: 8%;
      left: 4%;
      --dur: 17s
    }

    .orb2 {
      width: 220px;
      height: 220px;
      background: rgba(56, 199, 184, .05);
      top: 28%;
      right: 6%;
      --dur: 21s;
      animation-delay: -8s
    }

    .orb3 {
      width: 380px;
      height: 380px;
      background: rgba(245, 100, 30, .05);
      bottom: 15%;
      left: 48%;
      --dur: 19s;
      animation-delay: -5s
    }

    @keyframes orb-drift {

      0%,
      100% {
        transform: translateY(0) scale(1)
      }

      50% {
        transform: translateY(-32px) scale(1.07)
      }
    }

    /* ── Sun ── */
    .sun {
      position: absolute;
      bottom: 28%;
      left: 50%;
      transform: translateX(-50%);
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe9a0 0%, #f5a623 42%, rgba(240, 120, 30, 0) 72%);
      box-shadow: 0 0 70px 38px rgba(245, 166, 35, .24), 0 0 140px 70px rgba(240, 100, 10, .09);
      animation: sun-pulse 8s ease-in-out infinite;
      z-index: 1
    }

    @keyframes sun-pulse {

      0%,
      100% {
        transform: translateX(-50%) scale(1)
      }

      50% {
        transform: translateX(-50%) scale(1.09)
      }
    }

    /* ── Rays ── */
    .rays {
      position: absolute;
      bottom: 28%;
      left: 50%;
      width: 340px;
      height: 340px;
      margin-left: -170px;
      margin-bottom: -170px;
      z-index: 0;
      opacity: .065;
      animation: spin-rays 68s linear infinite
    }

    .ray {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 170px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255, 220, 100, .9), transparent);
      transform-origin: left center
    }

    @keyframes spin-rays {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }

    /* ── Clouds ── */
    .cloud-track {
      position: absolute;
      top: 0;
      left: 0;
      width: 250%;
      height: 100%;
      pointer-events: none
    }

    .ct1 {
      animation: drift 90s linear infinite
    }

    .ct2 {
      animation: drift 130s linear infinite;
      animation-delay: -45s
    }

    .ct3 {
      animation: drift 75s linear infinite;
      animation-delay: -18s;
      opacity: .5
    }

    @keyframes drift {
      from {
        transform: translateX(0)
      }

      to {
        transform: translateX(-50%)
      }
    }

    .cloud {
      position: absolute;
      border-radius: 60px;
      background: rgba(255, 255, 255, .76);
      filter: blur(3px)
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%
    }

    .cl-a {
      width: 240px;
      height: 58px;
      top: 9%;
      left: 5%
    }

    .cl-a::before {
      width: 100px;
      height: 100px;
      top: -52px;
      left: 36px
    }

    .cl-a::after {
      width: 78px;
      height: 78px;
      top: -40px;
      left: 104px
    }

    .cl-b {
      width: 185px;
      height: 46px;
      top: 19%;
      left: 46%;
      opacity: .68
    }

    .cl-b::before {
      width: 74px;
      height: 74px;
      top: -38px;
      left: 24px
    }

    .cl-b::after {
      width: 58px;
      height: 58px;
      top: -28px;
      left: 74px
    }

    .cl-c {
      width: 285px;
      height: 66px;
      top: 7%;
      left: 73%;
      opacity: .60
    }

    .cl-c::before {
      width: 108px;
      height: 108px;
      top: -56px;
      left: 46px
    }

    .cl-c::after {
      width: 85px;
      height: 85px;
      top: -44px;
      left: 126px
    }

    .cl-d {
      width: 170px;
      height: 42px;
      top: 26%;
      left: 19%;
      opacity: .46
    }

    .cl-d::before {
      width: 66px;
      height: 66px;
      top: -33px;
      left: 20px
    }

    .cl-d::after {
      width: 52px;
      height: 52px;
      top: -25px;
      left: 64px
    }

    .cl-e {
      width: 225px;
      height: 53px;
      top: 13%;
      left: 33%;
      opacity: .56
    }

    .cl-e::before {
      width: 90px;
      height: 90px;
      top: -46px;
      left: 32px
    }

    .cl-e::after {
      width: 70px;
      height: 70px;
      top: -35px;
      left: 97px
    }

    .cl-f {
      width: 150px;
      height: 36px;
      top: 31%;
      left: 59%;
      opacity: .36;
      filter: blur(5px)
    }

    /* ── Mountains ── */
    .mtns {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 48%;
      z-index: 2
    }

    .mtns svg {
      width: 100%;
      height: 100%;
      display: block
    }

    /* ── Trees ── */
    .trees {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 19%;
      z-index: 3;
      pointer-events: none
    }

    .trees svg {
      width: 100%;
      height: 100%;
      display: block
    }

    /* ── Ground ── */
    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 7%;
      background: linear-gradient(180deg, #0a1a0a 0%, #050d05 100%);
      z-index: 4
    }

    .ground::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 68%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(245, 166, 35, .28), transparent)
    }

    /* ── Airplane ── */
    .plane-wrap {
      position: absolute;
      top: 12%;
      left: -180px;
      z-index: 5;
      animation: fly 32s cubic-bezier(.25, 0, .75, 1) infinite
    }

    .plane-svg {
      width: 145px;
      height: auto;
      filter: drop-shadow(0 6px 20px rgba(200, 230, 255, .42));
      transform: rotate(-5deg)
    }

    @keyframes fly {
      0% {
        left: -180px;
        top: 14%;
        opacity: 0
      }

      4% {
        opacity: 1
      }

      40% {
        top: 10%
      }

      65% {
        top: 12%
      }

      96% {
        opacity: 1
      }

      100% {
        left: 110%;
        top: 8%;
        opacity: 0
      }
    }

    /* ── Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      background: linear-gradient(162deg, rgba(2, 7, 22, .50) 0%, rgba(10, 20, 55, .25) 50%, rgba(0, 0, 0, .52) 100%)
    }

    /* ══ SCROLL WRAPPER ══ */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      padding: 36px 24px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ══ TOP NAV ══ */
    .topnav {
      width: 100%;
      max-width: 1100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
      animation: fade-down .8s var(--spring) both
    }

    @keyframes fade-down {
      from {
        opacity: 0;
        transform: translateY(-18px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color .25s, gap .25s
    }

    .back-link:hover {
      color: rgba(245, 210, 130, .85);
      gap: 9px
    }

    .back-link svg {
      width: 14px;
      height: 14px
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 25%, #f5c96a 65%, #f5a623 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .brand-globe {
      font-size: 22px
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .btn-new {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #b8621a, #f5a623);
      color: #1a0900;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      box-shadow: 0 4px 18px rgba(245, 166, 35, .38);
      transition: transform .28s var(--ease), box-shadow .28s var(--ease)
    }

    .btn-new:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(245, 166, 35, .52)
    }

    .btn-new svg {
      width: 14px;
      height: 14px
    }

    /* ══ HERO SECTION ══ */
    .hero {
      width: 100%;
      max-width: 1100px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 36px;
      animation: fade-up .8s .1s var(--spring) both
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .hero-left .hero-eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: rgba(245, 190, 90, .65);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 7px
    }

    .eyebrow-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 8px var(--teal);
      animation: blink 2s ease-in-out infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      line-height: 1.08;
      background: linear-gradient(135deg, #fff 20%, #f5c96a 58%, #f5a623 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .hero-sub {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-top: 8px
    }

    .hero-stats {
      display: flex;
      gap: 28px;
      align-items: flex-end;
      flex-wrap: wrap
    }

    .hstat {
      text-align: center
    }

    .hstat-num {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #f5c96a, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 3px
    }

    .hstat-lbl {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(200, 180, 145, .45)
    }

    /* ══ CONTROLS BAR ══ */
    .controls {
      width: 100%;
      max-width: 1100px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 30px;
      animation: fade-up .8s .18s var(--spring) both
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
      display: flex;
      align-items: center
    }

    .search-icon {
      position: absolute;
      left: 14px;
      width: 15px;
      height: 15px;
      color: rgba(245, 166, 35, .45);
      pointer-events: none;
      z-index: 1
    }

    .search-input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 50px;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 300;
      outline: none;
      transition: border-color .3s, background .3s, box-shadow .3s;
      caret-color: var(--gold)
    }

    .search-input::placeholder {
      color: rgba(200, 180, 145, .38)
    }

    .search-input:focus {
      border-color: rgba(245, 166, 35, .5);
      background: rgba(255, 255, 255, .1);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, .12)
    }

    .filter-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .filter-btn {
      padding: 9px 16px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 50px;
      background: rgba(255, 255, 255, .06);
      color: rgba(210, 190, 155, .65);
      font-family: 'Outfit', sans-serif;
      font-size: 11.5px;
      font-weight: 400;
      letter-spacing: .05em;
      cursor: pointer;
      outline: none;
      transition: all .28s var(--ease)
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, .11);
      border-color: rgba(255, 255, 255, .22);
      color: rgba(235, 215, 175, .92)
    }

    .filter-btn.active {
      background: linear-gradient(135deg, rgba(184, 98, 26, .28), rgba(245, 166, 35, .20));
      border-color: rgba(245, 166, 35, .48);
      color: rgba(245, 200, 120, .95);
      box-shadow: 0 2px 12px rgba(245, 166, 35, .18)
    }

    .sort-wrap {
      position: relative;
      display: flex;
      align-items: center
    }

    .sort-icon {
      position: absolute;
      left: 12px;
      width: 14px;
      height: 14px;
      color: rgba(245, 166, 35, .45);
      pointer-events: none;
      z-index: 1
    }

    .sort-select {
      padding: 9px 34px 9px 34px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 50px;
      background: rgba(255, 255, 255, .06);
      appearance: none;
      -webkit-appearance: none;
      color: rgba(210, 190, 155, .72);
      font-family: 'Outfit', sans-serif;
      font-size: 11.5px;
      outline: none;
      cursor: pointer;
      transition: all .28s;
      color-scheme: dark
    }

    .sort-select option {
      background: #0d1f4e;
      color: rgba(255, 248, 235, .95)
    }

    .sort-select:focus {
      border-color: rgba(245, 166, 35, .5);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, .12)
    }

    .sort-chevron {
      position: absolute;
      right: 10px;
      pointer-events: none;
      color: rgba(245, 166, 35, .45)
    }

    .sort-chevron svg {
      width: 12px;
      height: 12px
    }

    /* ══ GRID ══ */
    .grid {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 22px;
      animation: fade-up .8s .26s var(--spring) both
    }

    /* ══ TRIP CARD ══ */
    .trip-card {
      position: relative;
      background: #0b1a44;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5), 0 1px 0 rgba(255, 255, 255, .05) inset;
      transition: transform .38s var(--spring), box-shadow .38s var(--spring), border-color .38s;
      animation: card-pop var(--delay, .3s) var(--spring) both;
      opacity: 0;
      transform: translateY(24px) scale(.97)
    }

    @keyframes card-pop {
      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    .trip-card:hover {
      transform: translateY(-8px) scale(1.015);
      box-shadow: 0 22px 60px rgba(0, 0, 0, .5), 0 0 0 1px rgba(245, 166, 35, .22), 0 0 40px rgba(245, 166, 35, .1);
      border-color: rgba(245, 166, 35, .32)
    }

    .trip-card:hover .card-glow {
      opacity: 1
    }

    .trip-card:hover .card-action-bar {
      transform: translateY(0);
      opacity: 1
    }

    /* Top shimmer rim per card */
    .trip-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 15%;
      right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--card-rim, rgba(245, 166, 35, .6)), transparent);
      border-radius: 999px;
      z-index: 1
    }

    /* Glow bg on hover */
    .card-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, var(--card-glow, rgba(245, 166, 35, .07)) 0%, transparent 70%);
      opacity: 0;
      transition: opacity .4s;
      pointer-events: none;
      z-index: 0
    }

    /* ── Card colour band (top bar) ── */
    .card-band {
      position: relative;
      height: 6px;
      background: var(--band-grad, linear-gradient(90deg, #b8621a, #f5a623, #f5c96a));
      z-index: 2
    }

    /* ── Card body ── */
    .card-body {
      padding: 22px 22px 16px;
      position: relative;
      z-index: 2
    }

    /* Top row: status pill + menu */
    .card-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border-radius: 50px;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      border: 1px solid var(--pill-bdr, rgba(245, 166, 35, .3));
      background: var(--pill-bg, rgba(245, 166, 35, .10));
      color: var(--pill-color, rgba(245, 200, 100, .9))
    }

    .pill-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 6px currentColor
    }

    .card-menu-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(255, 255, 255, .06);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(200, 180, 145, .55);
      transition: all .25s;
      outline: none
    }

    .card-menu-btn:hover {
      background: rgba(255, 255, 255, .12);
      border-color: rgba(255, 255, 255, .2);
      color: rgba(235, 215, 175, .9)
    }

    .card-menu-btn svg {
      width: 14px;
      height: 14px
    }

    /* Destination icon + name */
    .card-dest {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 4px
    }

    .dest-icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      line-height: 1;
      background: var(--icon-bg, rgba(245, 166, 35, .14));
      border: 1px solid var(--icon-bdr, rgba(245, 166, 35, .22))
    }

    .dest-info {
      flex: 1;
      min-width: 0
    }

    .dest-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.12rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .dest-location {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: .04em;
      color: var(--text-muted);
      margin-top: 2px
    }

    .dest-location svg {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
      color: rgba(245, 166, 35, .55)
    }

    /* Divider */
    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .09), transparent);
      margin: 14px 0
    }

    /* Meta grid */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .meta-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(200, 175, 130, .42)
    }

    .meta-value {
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: .02em;
      color: rgba(235, 220, 190, .88);
      display: flex;
      align-items: center;
      gap: 5px
    }

    .meta-value svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      opacity: .65
    }

    .meta-budget {
      color: rgba(245, 200, 100, .95);
      font-weight: 600;
      text-shadow: 0 0 12px rgba(245, 166, 35, .25)
    }

    /* Tags */
    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px
    }

    .tag {
      padding: 3px 9px;
      border-radius: 50px;
      font-size: 9.5px;
      font-weight: 400;
      letter-spacing: .08em;
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .11);
      color: rgba(210, 190, 155, .58)
    }

    /* Action bar (hover reveal) */
    .card-action-bar {
      display: flex;
      gap: 0;
      border-top: 1px solid rgba(255, 255, 255, .09);
      transform: translateY(6px);
      opacity: 0;
      transition: transform .32s var(--spring), opacity .32s;
      position: relative;
      z-index: 2
    }

    .card-action {
      flex: 1;
      padding: 11px 8px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: .06em;
      color: rgba(200, 180, 145, .55);
      outline: none;
      transition: background .25s, color .25s
    }

    .card-action:not(:last-child) {
      border-right: 1px solid rgba(255, 255, 255, .07)
    }

    .card-action:hover {
      background: rgba(255, 255, 255, .06);
      color: rgba(235, 215, 175, .9)
    }

    .card-action.delete:hover {
      background: rgba(232, 96, 122, .08);
      color: rgba(232, 96, 122, .85)
    }

    .card-action svg {
      width: 13px;
      height: 13px
    }

    /* ══ LOAD BUTTON ══ */
    .load-section {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 38px;
      gap: 18px;
      animation: fade-up .8s .4s var(--spring) both
    }

    .btn-load {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 44px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #b8621a 0%, #d98228 42%, #f5a623 80%, #f5c96a 100%);
      color: #1a0900;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .07em;
      overflow: hidden;
      outline: none;
      box-shadow: 0 6px 34px rgba(245, 166, 35, .44), 0 2px 10px rgba(0, 0, 0, .3);
      transition: transform .32s var(--ease), box-shadow .32s var(--ease)
    }

    .btn-load:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: 0 14px 50px rgba(245, 166, 35, .58), 0 4px 18px rgba(0, 0, 0, .35)
    }

    .btn-load:active:not(:disabled) {
      transform: scale(.97)
    }

    .btn-load:disabled {
      opacity: .55;
      cursor: not-allowed
    }

    .btn-load::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 38%, rgba(255, 255, 255, .22) 50%, transparent 62%);
      opacity: 0;
      transition: opacity .4s
    }

    .btn-load:hover::before {
      opacity: 1;
      animation: shine-sw .5s ease forwards
    }

    @keyframes shine-sw {
      from {
        background-position: -200% 0
      }

      to {
        background-position: 200% 0
      }
    }

    .load-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      transition: transform .4s var(--spring)
    }

    .btn-load:hover .load-icon {
      transform: rotate(20deg) scale(1.15)
    }

    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(26, 9, 0, .28);
      border-top-color: #1a0900;
      border-radius: 50%;
      animation: spin .7s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .btn-load.loading .load-icon,
    .btn-load.loading span {
      display: none
    }

    .btn-load.loading .btn-spinner {
      display: block
    }

    .load-note {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: .08em;
      color: rgba(200, 175, 130, .4)
    }

    /* ══ EMPTY STATE ══ */
    .empty-state {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 60px 32px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px
    }

    .empty-state.show {
      display: flex
    }

    .empty-icon {
      font-size: 54px;
      animation: float-empty 4s ease-in-out infinite
    }

    @keyframes float-empty {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-10px)
      }
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 25%, #f5c96a 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .empty-sub {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: .05em;
      color: var(--text-muted);
      line-height: 1.7
    }

    .btn-empty {
      padding: 13px 28px;
      border: 1px solid rgba(245, 166, 35, .38);
      border-radius: 50px;
      background: rgba(245, 166, 35, .1);
      color: rgba(245, 200, 120, .92);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .28s;
      outline: none
    }

    .btn-empty:hover {
      background: rgba(245, 166, 35, .18);
      border-color: rgba(245, 166, 35, .58)
    }

    /* ══ TOAST ══ */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: rgba(10, 18, 48, .90);
      border: 1px solid rgba(245, 166, 35, .28);
      backdrop-filter: blur(22px);
      color: rgba(245, 210, 130, .96);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: .04em;
      padding: 12px 28px;
      border-radius: 50px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s, transform .35s var(--ease);
      white-space: nowrap;
      z-index: 999;
      box-shadow: 0 4px 28px rgba(0, 0, 0, .5)
    }

    .toast.on {
      opacity: 1;
      transform: translateX(-50%) translateY(0)
    }

    .toast.success {
      border-color: rgba(56, 199, 184, .4);
      color: rgba(100, 230, 210, .96)
    }

    .toast.danger {
      border-color: rgba(232, 96, 122, .4);
      color: rgba(240, 140, 155, .96)
    }

    /* ══ RESPONSIVE ══ */
    @media(max-width:680px) {
      .page {
        padding: 24px 16px 48px
      }

      .topnav {
        margin-bottom: 32px
      }

      .hero {
        gap: 16px
      }

      .hero-stats {
        gap: 18px
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 16px
      }

      .controls {
        gap: 8px
      }

      .filter-btns {
        gap: 6px
      }
    }

    @media(max-width:420px) {
      .filter-btns .filter-btn:nth-child(n+4) {
        display: none
      }
    }
  </style>
</head>

      function draw() { ctx.clearRect(0, 0, W, H); stars.forEach(s => { s.a += s.da; if (s.a > s.maxA || s.a < .04) s.da *= -1; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,245,220,${s.a})`; ctx.fill() }); requestAnimationFrame(draw) }

      },

      },

        band: 'linear-gradient(90deg,#404898,#7078d8,#a0a8ff)', rim: 'rgba(112,120,216,.60)', glow: 'rgba(112,120,216,.07)', iconBg: 'rgba(112,120,216,.14)', iconBdr: 'rgba(112,120,216,.22)'
      },
    ];

    const STATUS_CONFIG = {
      upcoming: { label: 'Upcoming', bg: 'rgba(56,199,184,.10)', bdr: 'rgba(56,199,184,.32)', color: 'rgba(80,220,200,.92)' },
      ongoing: { label: 'Ongoing ✦', bg: 'rgba(245,166,35,.12)', bdr: 'rgba(245,166,35,.38)', color: 'rgba(245,200,100,.95)' },
      completed: { label: 'Completed', bg: 'rgba(255,255,255,.07)', bdr: 'rgba(255,255,255,.16)', color: 'rgba(200,185,155,.70)' },
      planned: { label: 'Planned', bg: 'rgba(139,111,212,.10)', bdr: 'rgba(139,111,212,.30)', color: 'rgba(180,160,230,.88)' },
    };

    /* ══ STATE ══ */
    let currentFilter = 'all', currentSearch = '', currentSort = 'date-asc';
    let shownCount = 6, filteredTrips = [], toastTimer = null;

    /* ══ RENDER ══ */
    function formatDate(d) {
      if (!d) return '—';
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
    }
    function daysBetween(a, b) {
      if (!a || !b) return null;
      const diff = new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00');
      return Math.ceil(diff / 8640000);
    }

    function buildCard(trip, idx) {
      const sc = STATUS_CONFIG[trip.status] || STATUS_CONFIG.completed;
      const nights = daysBetween(trip.date, trip.endDate);
      const nightsStr = nights ? `${nights}N / ${nights + 1}D` : '';
      const delay = (idx * .09 + .05).toFixed(2) + 's';
      const tagsHtml = trip.tags.slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('');

      return `
<div class="trip-card"
  style="--delay:${delay};--band-grad:${trip.band};--card-rim:${trip.rim};--card-glow:${trip.glow};--icon-bg:${trip.iconBg};--icon-bdr:${trip.iconBdr}"
  data-id="${trip.id}">
  <div class="card-glow"></div>
  <div class="card-band"></div>
  <div class="card-body">
    <div class="card-top-row">
      <div class="status-pill" style="--pill-bg:${sc.bg};--pill-bdr:${sc.bdr};--pill-color:${sc.color}">
        <span class="pill-dot"></span>${sc.label}
      </div>
      <button class="card-menu-btn" onclick="cardMenu(event,${trip.id})" aria-label="Options">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </button>
    </div>
    <div class="card-dest">
      <div class="dest-icon">${trip.icon}</div>
      <div class="dest-info">
        <div class="dest-name">${trip.name}</div>
        <div class="dest-location">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${trip.city}, ${trip.location}
        </div>
      </div>
    </div>
    <div class="card-divider"></div>
    <div class="meta-grid">
      <div class="meta-item">
        <span class="meta-label">Departure</span>
        <span class="meta-value">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${formatDate(trip.date)}
        </span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Duration</span>
        <span class="meta-value">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${nightsStr || 'TBD'}
        </span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Travelers</span>
        <span class="meta-value">
          ${trip.travelers} ${trip.travelers === 1 ? 'Person' : 'People'}
        </span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Budget</span>
        <span class="meta-value meta-budget">
         ₹${trip.budget.toLocaleString('en-IN')}
        </span>
      </div>
    </div>
    ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
  </div>
  <div class="card-action-bar">
    <button class="card-action" onclick="tripAction('view',${trip.id})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      View
    </button>
    <button class="card-action" onclick="tripAction('edit',${trip.id})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit
    </button>
    <button class="card-action" onclick="tripAction('share',${trip.id})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Share
    </button>
    <button class="card-action delete" onclick="tripAction('delete',${trip.id})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      Delete
    </button>
  </div>
</div>`;
    }

    /* ══ FILTER & SORT ══ */
    function getFiltered() {
      let trips = [...ALL_TRIPS];
      if (currentFilter !== 'all') trips = trips.filter(t => t.status === currentFilter);
      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        trips = trips.filter(t =>
          t.name.toLowerCase().includes(q) ||
          t.location.toLowerCase().includes(q) ||
          t.city.toLowerCase().includes(q)
        );
      }
      trips.sort((a, b) => {
        switch (currentSort) {
          case 'date-asc': return new Date(a.date) - new Date(b.date);
          case 'date-desc': return new Date(b.date) - new Date(a.date);
          case 'budget-desc': return b.budget - a.budget;
          case 'budget-asc': return a.budget - b.budget;
          case 'name-asc': return a.name.localeCompare(b.name);
        }
        return 0;
      });
      return trips;
    }

    function renderGrid(append = false) {
      filteredTrips = getFiltered();
      const grid = document.getElementById('tripGrid');
      const empty = document.getElementById('emptyState');
      const loadSec = document.getElementById('loadSection');

      if (!append) { grid.innerHTML = ''; shownCount = 6 }

      const slice = filteredTrips.slice(0, shownCount);
      if (filteredTrips.length === 0) {
        grid.innerHTML = ''; empty.classList.add('show'); loadSec.style.display = 'none';
      } else {
        empty.classList.remove('show');
        loadSec.style.display = 'flex';
        if (!append) grid.innerHTML = slice.map((t, i) => buildCard(t, i)).join('');
        else {
          const prev = grid.querySelectorAll('.trip-card').length;
          const newOnes = filteredTrips.slice(prev, shownCount);
          newOnes.forEach((t, i) => {
            const tmp = document.createElement('div');
            tmp.innerHTML = buildCard(t, i);
            const card = tmp.firstElementChild;
            grid.appendChild(card);
          });
        }
        document.getElementById('shownCount').textContent = Math.min(shownCount, filteredTrips.length);
        document.getElementById('totalCount').textContent = filteredTrips.length;
        const btn = document.getElementById('loadBtn');
        btn.disabled = shownCount >= filteredTrips.length;
        btn.querySelector('span').textContent = shownCount >= filteredTrips.length ? 'All Trips Loaded' : 'Load More Trips';
      }
      updateStats();
    }

    function updateStats() {
      const now = new Date();
      document.getElementById('statTotal').textContent = ALL_TRIPS.length;
      document.getElementById('statUpcoming').textContent = ALL_TRIPS.filter(t => t.status === 'upcoming' || t.status === 'planned').length;
      const countries = new Set(ALL_TRIPS.map(t => t.location));
      document.getElementById('statCountries').textContent = countries.size;
    }

    /* ══ LOAD MORE ══ */
    function loadMore() {
      const btn = document.getElementById('loadBtn');
      btn.classList.add('loading'); btn.disabled = true;
      setTimeout(() => {
        btn.classList.remove('loading');
        shownCount = Math.min(shownCount + 6, filteredTrips.length);
        renderGrid(true);
        showToast(`✈️ ${Math.min(shownCount, filteredTrips.length)} of ${filteredTrips.length} trips shown`, '');
      }, 1200);
    }

    /* ══ ACTIONS ══ */
    function tripAction(action, id) {
      const trip = ALL_TRIPS.find(t => t.id === id);
      if (!trip) return;
      const msgs = {
        view: `🌍 Opening "${trip.name}"…`,
        edit: `✏️ Editing "${trip.name}"…`,
        share: `🔗 Sharing "${trip.name}"…`,
        delete: `🗑️ Removed "${trip.name}"`,
      };
      showToast(msgs[action] || '', action === 'delete' ? 'danger' : '');
    }

    function cardMenu(id) {
      const trip = ALL_TRIPS.find(t => t.id === id);
      showToast(`⚙️ Options for "${trip?.name}"…`, '');
    }

    /* ══ FILTERS ══ */
    document.getElementById('filterBtns').addEventListener('click', e => {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentFilter = e.target.dataset.filter;
      shownCount = 6; renderGrid();
    });

    document.getElementById('searchInput').addEventListener('input', function () {
      currentSearch = this.value.trim();
      shownCount = 6; renderGrid();
    });

    document.getElementById('sortSelect').addEventListener('change', function () {
      currentSort = this.value; renderGrid();
    });

    function resetFilters() {
      currentFilter = 'all'; currentSearch = ''; currentSort = 'date-asc';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-filter="all"]').classList.add('active');
      document.getElementById('searchInput').value = '';
      document.getElementById('sortSelect').value = 'date-asc';
      shownCount = 6; renderGrid();
    }

    /* ══ TOAST ══ */
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      if (toastTimer) { clearTimeout(toastTimer); t.classList.remove('on', 'success', 'danger'); void t.offsetWidth }
      t.textContent = msg;
      t.classList.remove('success', 'danger');
      if (type === 'success') t.classList.add('success');
      if (type === 'danger') t.classList.add('danger');
      t.classList.add('on');
      toastTimer = setTimeout(() => { t.classList.remove('on', 'success', 'danger'); toastTimer = null }, 2800);
    }

    /* ══ INIT ══ */
    renderGrid();

    /* ══ Subtle scroll parallax on scene ══ */
    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      document.getElementById('scene').style.transform = `translateY(${y * .18}px)`;
    }, { passive: true });
  </script>
  <script src="script.js"></script>
