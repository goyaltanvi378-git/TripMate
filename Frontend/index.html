<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TripMate Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   TRIPMATE DASHBOARD — Full Single-File Build
   Design: Luminous Dusk-to-Dawn Travel Scene
══════════════════════════════════════════ */

/* ── Variables ── */
:root {
  --dusk-top:    #04091a;
  --dusk-mid:    #0d1f4e;
  --dusk-gold:   #c96a1a;
  --dusk-amber:  #f0a34a;
  --dusk-peach:  #ffd6a0;
  --accent:      #f5a623;
  --accent2:     #38c7b8;
  --glass:       rgba(255,255,255,0.07);
  --glass-b:     rgba(255,255,255,0.16);
  --white:       #ffffff;
  --text-muted:  rgba(230,215,190,0.6);
  --r-card:      30px;
  --r-btn:       16px;
  --ease:        cubic-bezier(0.4,0,0.2,1);
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;cursor:default}

/* ══ SCENE WRAPPER ══ */
#scene{
  position:fixed;inset:0;
  background:linear-gradient(175deg,
    var(--dusk-top) 0%,
    #0b1a44 28%,
    #153070 50%,
    #a04010 72%,
    var(--dusk-amber) 85%,
    #ffd090 100%
  );
  overflow:hidden;
}

/* ── Stars canvas ── */
#starCanvas{position:absolute;inset:0;z-index:0}

/* ── Sun ── */
.sun{
  position:absolute;
  bottom:30%;left:50%;
  transform:translateX(-50%);
  width:90px;height:90px;
  border-radius:50%;
  background:radial-gradient(circle,#ffe9a0 0%,#f5a623 40%,rgba(240,120,30,0) 72%);
  box-shadow:0 0 80px 40px rgba(245,166,35,0.28),0 0 160px 80px rgba(240,100,10,0.12);
  animation:sun-pulse 8s ease-in-out infinite;
  z-index:1;
}
@keyframes sun-pulse{
  0%,100%{transform:translateX(-50%) scale(1);box-shadow:0 0 80px 40px rgba(245,166,35,0.28),0 0 160px 80px rgba(240,100,10,0.12)}
  50%{transform:translateX(-50%) scale(1.08);box-shadow:0 0 110px 55px rgba(245,166,35,0.38),0 0 200px 100px rgba(240,100,10,0.18)}
}

/* ── Sun rays ── */
.rays{
  position:absolute;
  bottom:30%;left:50%;
  transform:translateX(-50%);
  width:400px;height:400px;
  margin-left:-200px;margin-bottom:-200px;
  z-index:0;
  animation:spin-rays 60s linear infinite;
  opacity:0.08;
}
.ray{
  position:absolute;
  top:50%;left:50%;
  width:200px;height:2px;
  background:linear-gradient(90deg,rgba(255,220,100,0.9),transparent);
  transform-origin:left center;
}
@keyframes spin-rays{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── Clouds ── */
.cloud-track{position:absolute;top:0;left:0;width:260%;height:100%;z-index:2;pointer-events:none}
.ct1{animation:drift 90s linear infinite}
.ct2{animation:drift 130s linear infinite;animation-delay:-40s}
.ct3{animation:drift 70s linear infinite;animation-delay:-15s;opacity:.55}

@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.cloud{
  position:absolute;
  border-radius:60px;
  background:rgba(255,255,255,0.78);
  filter:blur(3px);
}
.cloud::before,.cloud::after{
  content:'';position:absolute;background:inherit;border-radius:50%;
}
/* Cloud definitions */
.cl-a{width:260px;height:62px;top:10%;left:4%}
.cl-a::before{width:110px;height:110px;top:-55px;left:40px}
.cl-a::after{width:85px;height:85px;top:-45px;left:110px}

.cl-b{width:200px;height:50px;top:20%;left:48%;opacity:.7}
.cl-b::before{width:80px;height:80px;top:-42px;left:28px}
.cl-b::after{width:62px;height:62px;top:-32px;left:78px}

.cl-c{width:300px;height:70px;top:6%;left:76%;opacity:.65}
.cl-c::before{width:115px;height:115px;top:-60px;left:50px}
.cl-c::after{width:90px;height:90px;top:-48px;left:130px}

.cl-d{width:180px;height:44px;top:28%;left:22%;opacity:.5}
.cl-d::before{width:70px;height:70px;top:-36px;left:22px}
.cl-d::after{width:55px;height:55px;top:-28px;left:68px}

.cl-e{width:240px;height:56px;top:14%;left:35%;opacity:.6}
.cl-e::before{width:95px;height:95px;top:-50px;left:36px}
.cl-e::after{width:74px;height:74px;top:-38px;left:102px}

.cl-f{width:160px;height:40px;top:33%;left:62%;opacity:.4;filter:blur(4px)}
.cl-g{width:210px;height:52px;top:7%;left:18%;opacity:.5;filter:blur(3px)}

/* ── Mountains ── */
.mtns{
  position:absolute;bottom:0;left:0;width:100%;height:52%;z-index:3;
}
.mtns svg{width:100%;height:100%;display:block}

/* ── Trees ── */
.trees{
  position:absolute;bottom:0;left:0;width:100%;height:22%;z-index:4;
  pointer-events:none;
}
.trees svg{width:100%;height:100%;display:block}

/* ── Ground ── */
.ground{
  position:absolute;bottom:0;left:0;width:100%;height:9%;
  background:linear-gradient(180deg,#0a1a0a 0%,#050d05 100%);
  z-index:5;
}
/* Ground glow from sunset */
.ground::before{
  content:'';position:absolute;top:0;left:50%;
  transform:translateX(-50%);
  width:70%;height:3px;
  background:linear-gradient(90deg,transparent,rgba(245,166,35,0.35),transparent);
}

/* ── Airplane ── */
.plane-wrap{
  position:absolute;
  top:17%;left:-180px;
  z-index:6;
  animation:fly 26s cubic-bezier(0.25,0,0.75,1) infinite;
}
.plane-svg{
  width:160px;height:auto;
  filter:drop-shadow(0 6px 24px rgba(200,230,255,0.5));
  transform:rotate(-5deg);
}
@keyframes fly{
  0%  {left:-180px;top:20%;opacity:0;transform:none}
  4%  {opacity:1}
  35% {top:15%;transform:translateY(-6px)}
  65% {top:17%;transform:translateY(0)}
  96% {opacity:1}
  100%{left:110%;top:12%;opacity:0}
}

/* Contrail */
.contrail{
  position:absolute;
  top:17%;left:-80px;
  z-index:5;
  animation:fly 26s cubic-bezier(0.25,0,0.75,1) infinite;
  pointer-events:none;
}
.contrail::before{
  content:'';display:block;
  width:300px;height:3px;
  border-radius:99px;
  background:linear-gradient(90deg,rgba(255,255,255,0.0),rgba(255,255,255,0.22),rgba(255,255,255,0.0));
  margin-top:22px;margin-left:-300px;
  filter:blur(2px);
}

/* ── Overlay gradient ── */
.overlay{
  position:fixed;inset:0;z-index:7;
  background:linear-gradient(160deg,rgba(2,7,22,0.52) 0%,rgba(10,20,55,0.28) 55%,rgba(0,0,0,0.55) 100%);
  pointer-events:none;
}

/* ══ STAGE ══ */
.stage{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}

/* ══ CARD ══ */
.card{
  position:relative;
  width:100%;max-width:480px;
  padding:52px 48px 44px;
  background:var(--glass);
  border:1px solid var(--glass-b);
  border-radius:var(--r-card);
  backdrop-filter:blur(32px) saturate(1.7) brightness(1.05);
  -webkit-backdrop-filter:blur(32px) saturate(1.7) brightness(1.05);
  box-shadow:
    0 12px 60px rgba(0,0,0,0.5),
    0 2px 0 rgba(255,255,255,0.12) inset,
    0 0 0 1px rgba(255,255,255,0.04) inset;
  display:flex;flex-direction:column;align-items:center;
  animation:card-rise 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
  opacity:0;transform:translateY(40px) scale(0.96);
  will-change:transform;
}
@keyframes card-rise{
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Gold shimmer rim */
.card::before{
  content:'';position:absolute;
  top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,166,35,0.75),transparent);
  border-radius:999px;
}
/* Bottom glow */
.card::after{
  content:'';position:absolute;
  bottom:-1px;left:30%;right:30%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(56,199,184,0.4),transparent);
}

/* ── Pill badge ── */
.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 16px;border-radius:999px;margin-bottom:22px;
  background:rgba(245,166,35,0.12);
  border:1px solid rgba(245,166,35,0.28);
  font-family:'Outfit',sans-serif;
  font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(245,190,90,0.85);
  animation:badge-in .8s .2s both;
}
@keyframes badge-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#38c7b8;box-shadow:0 0 8px #38c7b8;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Heading ── */
.card-globe{
  font-size:56px;line-height:1;margin-bottom:10px;
  animation:globe-float 5s ease-in-out infinite,card-rise .9s .1s both;
  filter:drop-shadow(0 6px 24px rgba(245,166,35,0.55));
}
@keyframes globe-float{
  0%,100%{transform:translateY(0) rotate(-2deg)}
  50%{transform:translateY(-10px) rotate(3deg)}
}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.2rem,6vw,3rem);
  font-weight:900;line-height:1.05;
  letter-spacing:.01em;text-align:center;
  background:linear-gradient(135deg,#fff 25%,#f5c96a 60%,#f5a623 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
  margin-bottom:6px;
  animation:card-rise .9s .15s both;
}

.card-sub{
  font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:32px;
  animation:card-rise .9s .2s both;
}

/* ── Stat strip ── */
.stats{
  display:flex;align-items:center;gap:0;
  width:100%;margin-bottom:32px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:14px;overflow:hidden;
  animation:card-rise .9s .28s both;
}
.stat{
  flex:1;padding:12px 8px;text-align:center;
  border-right:1px solid rgba(255,255,255,0.08);
}
.stat:last-child{border-right:none}
.stat-num{
  font-family:'Playfair Display',serif;
  font-size:1.3rem;font-weight:700;
  background:linear-gradient(135deg,#f5c96a,#f5a623);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;line-height:1;margin-bottom:3px;
}
.stat-lbl{
  font-family:'Outfit',sans-serif;
  font-size:9px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;
  color:rgba(200,185,155,0.55);
}

/* ── Divider ── */
.div-row{
  display:flex;align-items:center;gap:10px;width:88%;margin-bottom:30px;
  animation:card-rise .9s .32s both;
}
.div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(245,166,35,0.3),transparent)}
.div-ico{color:rgba(245,166,35,0.5);font-size:10px;letter-spacing:.1em}

/* ══ BUTTONS ══ */
.btn-stack{
  display:flex;flex-direction:column;gap:13px;width:100%;
  animation:card-rise .9s .38s both;
}

.btn{
  position:relative;display:flex;align-items:center;gap:14px;
  width:100%;padding:16px 22px;border:none;border-radius:var(--r-btn);
  cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;
  letter-spacing:.05em;overflow:hidden;outline:none;
  transition:transform .3s var(--ease),box-shadow .3s var(--ease);
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(0.96)!important}
.btn:hover{transform:translateY(-4px)}
.btn:hover .btn-arrow{transform:translateX(5px)}

/* Icon box */
.btn-icon-box{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  transition:transform .3s var(--ease);
}
.btn:hover .btn-icon-box{transform:scale(1.12) rotate(-6deg)}
.btn-icon-box svg{width:18px;height:18px}

.btn-label{flex:1;text-align:left;font-size:14px;font-weight:500}
.btn-desc{font-size:10px;font-weight:300;letter-spacing:.1em;opacity:.65;display:block;margin-top:1px}

.btn-arrow{
  margin-left:auto;font-size:16px;opacity:.6;
  transition:transform .3s var(--ease);
}

/* Shimmer layer */
.btn-shine{
  position:absolute;inset:0;opacity:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.18) 50%,transparent 60%);
  transition:opacity .4s;
  pointer-events:none;
}
.btn:hover .btn-shine{opacity:1;animation:shine .5s ease forwards}
@keyframes shine{
  from{background-position:-200% 0}
  to{background-position:200% 0}
}

/* ─ Login button ─ */
.btn-login{
  background:linear-gradient(135deg,#b8621a 0%,#d98228 45%,#f5a623 80%,#f5c96a 100%);
  color:#1a0900;
  box-shadow:0 6px 32px rgba(245,166,35,0.42),0 2px 10px rgba(0,0,0,0.3);
}
.btn-login .btn-icon-box{background:rgba(255,255,255,0.22)}
.btn-login:hover{box-shadow:0 12px 48px rgba(245,166,35,0.58),0 4px 18px rgba(0,0,0,0.35)}
.btn-login .btn-label{color:#1a0900}
.btn-login .btn-desc{color:rgba(50,20,0,0.65)}
.btn-login .btn-arrow{color:#1a0900}

/* ─ Create Trip button ─ */
.btn-create{
  background:rgba(255,255,255,0.09);
  border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.92);
  box-shadow:0 4px 22px rgba(0,0,0,0.28);
  backdrop-filter:blur(10px);
}
.btn-create .btn-icon-box{background:rgba(56,199,184,0.18)}
.btn-create:hover{
  background:rgba(255,255,255,0.14);
  border-color:rgba(56,199,184,0.45);
  box-shadow:0 10px 40px rgba(56,199,184,0.2),0 4px 18px rgba(0,0,0,0.35);
}
.btn-create .btn-icon-box svg{color:#38c7b8}

/* ─ View Trips button ─ */
.btn-view{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.72);
  box-shadow:0 2px 14px rgba(0,0,0,0.22);
  backdrop-filter:blur(6px);
}
.btn-view .btn-icon-box{background:rgba(255,255,255,0.08)}
.btn-view:hover{
  background:rgba(255,255,255,0.1);
  border-color:rgba(255,255,255,0.22);
  color:rgba(255,255,255,0.92);
  box-shadow:0 8px 32px rgba(0,0,0,0.38);
}
.btn-view .btn-icon-box svg{color:rgba(210,190,150,0.85)}

/* ── Card footer ── */
.card-foot{
  margin-top:26px;
  font-family:'Outfit',sans-serif;
  font-size:10px;font-weight:300;letter-spacing:.16em;
  color:rgba(195,175,140,0.45);text-align:center;
  font-style:italic;
  animation:card-rise .9s .46s both;
}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:36px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:rgba(10,18,48,0.82);
  border:1px solid rgba(245,166,35,0.3);
  backdrop-filter:blur(20px);
  color:rgba(245,210,130,0.95);
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:400;letter-spacing:.05em;
  padding:13px 30px;border-radius:50px;
  opacity:0;pointer-events:none;
  transition:opacity .38s,transform .38s var(--ease);
  white-space:nowrap;z-index:99;
  box-shadow:0 4px 28px rgba(0,0,0,0.5),0 0 0 1px rgba(245,166,35,0.12) inset;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ RESPONSIVE ══ */
@media(max-width:500px){
  .card{padding:38px 26px 32px}
  .btn{padding:14px 16px}
  .card-globe{font-size:46px}
  .stats{display:none}
}
@media(max-height:660px){
  .card{padding:30px 36px 26px}
  .card-globe{font-size:38px;margin-bottom:6px}
  .stats{margin-bottom:20px}
  .div-row{margin-bottom:18px}
  .btn-stack{gap:9px}
  .card-foot{margin-top:16px}
}
</style>
</head>
<body>

<!-- ══ SCENE ══ -->
<div id="scene">
  <canvas id="starCanvas"></canvas>

  <div class="sun"></div>

  <!-- Sun rays -->
  <div class="rays" id="rays"></div>

  <!-- Cloud tracks (duplicated for seamless loop) -->
  <div class="cloud-track ct1">
    <div class="cloud cl-a"></div>
    <div class="cloud cl-b"></div>
    <div class="cloud cl-c"></div>
    <div class="cloud cl-f"></div>
    <!-- mirror -->
    <div class="cloud cl-a" style="left:54%"></div>
    <div class="cloud cl-b" style="left:98%"></div>
    <div class="cloud cl-c" style="left:126%"></div>
  </div>
  <div class="cloud-track ct2">
    <div class="cloud cl-d"></div>
    <div class="cloud cl-e"></div>
    <div class="cloud cl-g"></div>
    <div class="cloud cl-d" style="left:72%"></div>
    <div class="cloud cl-e" style="left:108%"></div>
  </div>
  <div class="cloud-track ct3">
    <div class="cloud cl-f"></div>
    <div class="cloud cl-b" style="left:38%;top:32%"></div>
    <div class="cloud cl-f" style="left:88%"></div>
  </div>

  <!-- Mountains -->
  <div class="mtns">
    <svg viewBox="0 0 1440 380" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="mFar" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1c3066" stop-opacity=".75"/>
          <stop offset="100%" stop-color="#080e22" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="mMid" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#122050" stop-opacity=".9"/>
          <stop offset="100%" stop-color="#060c18" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="mNear" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0c1830" stop-opacity="1"/>
          <stop offset="100%" stop-color="#030810" stop-opacity="1"/>
        </linearGradient>
        <!-- Snow caps -->
        <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
      </defs>
      <!-- Far range -->
      <polygon fill="url(#mFar)" points="0,240 80,140 160,190 260,100 370,160 480,80 600,155 720,65 840,145 960,75 1080,155 1200,85 1320,150 1440,100 1440,380 0,380"/>
      <!-- Snow on far peaks -->
      <polygon fill="url(#snow)" opacity=".7" points="260,100 240,130 280,130"/>
      <polygon fill="url(#snow)" opacity=".6" points="480,80 458,118 502,118"/>
      <polygon fill="url(#snow)" opacity=".7" points="720,65 698,100 742,100"/>
      <polygon fill="url(#snow)" opacity=".6" points="960,75 940,110 980,110"/>
      <polygon fill="url(#snow)" opacity=".55" points="1200,85 1180,120 1220,120"/>
      <!-- Mid range -->
      <polygon fill="url(#mMid)" points="0,280 70,210 150,250 240,185 340,230 450,165 570,225 680,155 800,220 920,160 1040,220 1160,165 1280,220 1380,180 1440,205 1440,380 0,380"/>
      <!-- Near range -->
      <polygon fill="url(#mNear)" points="0,320 60,270 140,295 240,250 360,290 480,240 600,280 720,245 840,278 960,245 1080,280 1200,248 1330,275 1440,252 1440,380 0,380"/>
    </svg>
  </div>

  <!-- Trees -->
  <div class="trees">
    <svg viewBox="0 0 1440 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="treeG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0a1f0a"/>
          <stop offset="100%" stop-color="#020602"/>
        </linearGradient>
      </defs>
      <g fill="url(#treeG)">
        <!-- Simplified silhouette of pine tree groups -->
        <!-- Left cluster -->
        <polygon points="10,160 25,95 40,160"/>
        <polygon points="22,160 40,80 58,160"/>
        <polygon points="38,160 55,90 72,160"/>

<script>
/* ══ Stars ══ */
(function(){
  const c = document.getElementById('starCanvas');
  const ctx = c.getContext('2d');
  let stars = [], W, H;

  function resize(){
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
    buildStars();
  }
  function buildStars(){
    stars = [];
    for(let i=0;i<90;i++){
      stars.push({
        x: Math.random()*W,
        y: Math.random()*H*0.6,
        r: Math.random()*1.6+0.3,
        a: Math.random(),
        da: (Math.random()*.012+.004)*(Math.random()<.5?1:-1),
        maxA: Math.random()*.7+.3
      });
    }
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.a += s.da;
      if(s.a>s.maxA||s.a<0.05) s.da*=-1;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,245,220,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize(); draw();
})();

/* ══ Sun rays ══ */
(function(){
  const wrap = document.getElementById('rays');
  const count = 18;
  for(let i=0;i<count;i++){
    const r = document.createElement('div');
    r.className='ray';
    r.style.transform=`rotate(${i*(360/count)}deg)`;
    wrap.appendChild(r);
  }
})();

/* ══ Parallax on mouse ══ */
(function(){
  const card = document.getElementById('card');
  let tx=0,ty=0,cx=0,cy=0,raf;

  document.addEventListener('mousemove',e=>{
    const mx = (e.clientX/window.innerWidth -.5)*2;
    const my = (e.clientY/window.innerHeight-.5)*2;
    tx = mx * 7;
    ty = my * -5;
  });
  document.addEventListener('mouseleave',()=>{tx=0;ty=0});

  function tick(){
    cx += (tx-cx)*.055;
    cy += (ty-cy)*.055;
    card.style.transform=`perspective(1000px) rotateY(${cx.toFixed(3)}deg) rotateX(${cy.toFixed(3)}deg)`;
    raf=requestAnimationFrame(tick);
  }
  raf=requestAnimationFrame(tick);
  // Touch: no parallax
  if('ontouchstart' in window) card.style.transform='none';
})();

/* ══ Nav & Toast ══ */
const toasts={
  login:  '✈️  Heading to Login…',
  create: '🗺️  Opening Trip Builder…',
  view:   '🌐  Loading Your Trips…'
};
let toastT=null;
function nav(a){
  const el=document.getElementById('toast');
  if(toastT){clearTimeout(toastT);el.classList.remove('on');void el.offsetWidth}
  el.textContent=toasts[a]||'…';
  el.classList.add('on');
  // Card pulse
  const card=document.getElementById('card');
  card.animate([{transform:'scale(0.985)'},{transform:'scale(1)'}],{duration:220,easing:'ease-out'});
  toastT=setTimeout(()=>{el.classList.remove('on');toastT=null},2600);
}

/* ══ Staggered button entrance ══ */
document.querySelectorAll('.btn').forEach((b,i)=>{
  b.style.opacity='0';
  b.style.transform='translateY(16px)';
  setTimeout(()=>{
    b.style.transition='opacity .5s ease, transform .5s ease';
    b.style.opacity='1';
    b.style.transform='translateY(0)';
  }, 800 + i*120);
});
</script>
